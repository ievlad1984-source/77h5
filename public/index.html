<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Інтерактивна Дошка Pro + Math</title>
    <!-- MathLive для введення -->
    <script src="https://unpkg.com"></script>
    <!-- KaTeX для рендерингу формул на Canvas -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: sans-serif; background: #fff; }
        #toolbar {
            position: absolute; top: 10px; left: 10px; background: white; padding: 10px;
            display: flex; gap: 8px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2); z-index: 1000; align-items: center;
        }
        .tool-btn { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; transition: 0.2s; }
        .tool-btn.active { background: #007bff; color: white; border-color: #0056b3; }
        #canvas-container { width: 100vw; height: 100vh; background: white; position: relative; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        
        #math-input-container {
            position: absolute; z-index: 2000; background: white; border: 1px solid #007bff;
            padding: 5px; border-radius: 4px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        math-field { font-size: 20px; min-width: 150px; border: none; outline: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <button class="tool-btn" data-tool="select">Виділення</button>
    <button class="tool-btn active" data-tool="pen">Ручка</button>
    <button class="tool-btn" data-tool="text">Текст</button>
    <button class="tool-btn" data-tool="math">Формула</button>
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="lineWidth" min="1" max="20" value="3">
    <button class="tool-btn" id="btn-delete-board" style="color:red">Видалити все</button>
</div>

<div id="math-input-container">
    <math-field id="math-field"></math-field>
</div>

<div id="canvas-container"><canvas id="board"></canvas></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const lineWidthInput = document.getElementById('lineWidth');
const mathContainer = document.getElementById('math-input-container');
const mathField = document.getElementById('math-field');

const boardId = window.location.pathname.split('/').pop() || 'main';
const socket = io({ query: { boardId } });

let scale = 1.0, offsetX = 0, offsetY = 0;
let objects = [], currentTool = 'pen', isDrawing = false, currentObj = null;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); }
window.addEventListener('resize', resize);
resize();

// Кеш для зображень формул, щоб не рендерити їх щосекунди
const mathCache = new Map();

async function renderMathToImage(latex, color, fontSize) {
    const key = `${latex}-${color}-${fontSize}`;
    if (mathCache.has(key)) return mathCache.get(key);

    const container = document.createElement('div');
    katex.render(latex, container, { displayMode: true, throwOnError: false });
    const svg = container.querySelector('svg');
    svg.setAttribute('fill', color);
    svg.style.color = color;

    const svgData = new XMLSerializer().serializeToString(svg);
    const img = new Image();
    const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);

    return new Promise(resolve => {
        img.onload = () => {
            mathCache.set(key, img);
            resolve(img);
        };
        img.src = url;
    });
}

async function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const all = objects.concat(currentObj ? [currentObj] : []);
    
    for (const obj of all) {
        ctx.lineWidth = obj.width * scale;
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        const sX = obj.x * scale + offsetX, sY = obj.y * scale + offsetY;

        if (obj.type === 'pen') {
            ctx.beginPath(); ctx.moveTo(sX, sY);
            if(obj.points) obj.points.forEach(p => ctx.lineTo(p.x * scale + offsetX, p.y * scale + offsetY));
            ctx.stroke();
        } else if (obj.type === 'text') {
            ctx.font = `${obj.size * scale}px Arial`;
            obj.text.split('\n').forEach((line, i) => ctx.fillText(line, sX, sY + (i * obj.size * 1.2 * scale)));
        } else if (obj.type === 'math') {
            const img = await renderMathToImage(obj.text, obj.color, obj.size);
            ctx.drawImage(img, sX, sY - (obj.size * scale), img.width * scale * 0.5, img.height * scale * 0.5);
        }
    }
}

function getCoords(e) { return { x: (e.clientX - offsetX) / scale, y: (e.clientY - offsetY) / scale }; }

function openMathInput(x, y) {
    const coords = getCoords({clientX: x, clientY: y});
    mathContainer.style.display = 'block';
    mathContainer.style.left = x + 'px'; mathContainer.style.top = y + 'px';
    setTimeout(() => mathField.focus(), 50);

    const finishMath = () => {
        const val = mathField.getValue('latex-simplified');
        if (val && mathContainer.style.display === 'block') {
            const mathObj = { type: 'math', text: val, x: coords.x, y: coords.y, color: colorPicker.value, size: 30 };
            objects.push(mathObj); socket.emit('new-object', mathObj);
        }
        mathContainer.style.display = 'none'; mathField.value = ''; draw();
    };

    mathField.onblur = (e) => { if(!mathContainer.contains(e.relatedTarget)) finishMath(); };
    mathField.addEventListener('keydown', (e) => { if (e.key === 'Enter') finishMath(); });
}

socket.on('init-history', h => { objects = h; draw(); });
socket.on('new-object', o => { objects.push(o); draw(); });

document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.onclick = () => {
    document.querySelector('.tool-btn.active').classList.remove('active');
    b.classList.add('active'); currentTool = b.dataset.tool; draw();
});

canvas.onmousedown = (e) => {
    if (mathContainer.style.display === 'block') return;
    const c = getCoords(e);
    if (currentTool === 'math') { openMathInput(e.clientX, e.clientY); return; }
    isDrawing = true;
    currentObj = { type: currentTool, color: colorPicker.value, width: lineWidthInput.value, x: c.x, y: c.y, points: [{x:c.x, y:c.y}] };
};

window.onmousemove = (e) => {
    if (!isDrawing || !currentObj || currentTool !== 'pen') return;
    const c = getCoords(e);
    currentObj.points.push({x: c.x, y: c.y});
    draw();
};

window.onmouseup = () => {
    if (isDrawing && currentObj) { objects.push(currentObj); socket.emit('new-object', currentObj); }
    isDrawing = false; currentObj = null; draw();
};
</script>
</body>
</html>
