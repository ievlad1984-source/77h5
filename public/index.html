<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Совместная доска с дробями</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; transition: 0.2s; }
        button:hover { background: #bdc3c7; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { display: block; cursor: crosshair; background-color: #ffffff; }
        
        /* Стили для плавающего инпута */
        #text-input-overlay {
            position: absolute;
            background: transparent;
            border: 1px dashed #3498db;
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 20px;
            color: transparent; /* Скрываем текст самого инпута, мы рисуем свой на канвасе */
            caret-color: black; /* Но курсор оставляем видимым */
            padding: 0;
            margin: 0;
            display: none;
            z-index: 100;
            min-width: 50px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('text')" id="textBtn">Текст / Дробь</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Прямоугольник</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="clearBoard()" style="background:#e74c3c; color:white; margin-left: auto;">Очистить всё</button>
</div>

<div id="canvas-container"><canvas id="canvas"></canvas></div>

<!-- Плавающий инпут для ввода текста -->
<input type="text" id="text-input-overlay">

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const textInput = document.getElementById('text-input-overlay'); // Ссылка на инпут
    
    let tool = 'pen', isDrawing = false, objects = [], currentObj = null;
    let isTextInputActive = false; // Флаг: печатаем ли мы текст прямо сейчас

    function resize() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        render();
    }
    window.onresize = resize;
    resize();
