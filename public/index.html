<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математична Дошка Ultra 2026</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        
        #toolbar {
            position: absolute; top: 15px; left: 15px; background: white; padding: 10px;
            display: flex; gap: 8px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.2); 
            z-index: 100; align-items: center; flex-wrap: wrap; max-width: 95vw;
        }

        .tool-btn { 
            padding: 10px 14px; cursor: pointer; border: 1px solid #e0e0e0; 
            background: #fff; border-radius: 6px; font-size: 14px; transition: 0.2s;
            display: flex; align-items: center; gap: 5px; user-select: none;
        }
        
        .tool-btn:hover { background: #f8f9fa; border-color: #007bff; }
        .tool-btn.active { background: #007bff; color: white; border-color: #0056b3; }

        .shapes-wrapper { position: relative; }
        #shapes-menu {
            position: absolute; top: 50px; left: 0; background: white; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); display: none; padding: 15px;
            width: 320px; z-index: 101; border: 1px solid #ddd;
        }
        #shapes-menu.show { display: block; }
        
        .shape-category { margin-bottom: 12px; }
        .category-title { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 8px; }
        .shape-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .shape-item { 
            aspect-ratio: 1; border: 1px solid #eee; border-radius: 6px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; transition: 0.15s; background: #fafafa;
        }
        .shape-item:hover { background: #eef6ff; border-color: #007bff; }

        /* Динамічний текст - автоматичне розтягування */
        .text-input-field {
            position: absolute; 
            min-width: 10px; 
            border: 1px dashed #007bff;
            outline: none; 
            background: rgba(255, 255, 255, 0.9);
            padding: 4px; 
            z-index: 2000; 
            font-family: Arial; 
            line-height: 1.2;
            white-space: pre-wrap; /* Дозволяє Enter та розтягування */
            word-wrap: break-word;
            display: inline-block;
        }

        #zoom-display { 
            position: absolute; bottom: 25px; right: 25px; background: white; 
            padding: 8px 18px; border-radius: 30px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; border: 1px solid #eee;
        }

        canvas { display: block; touch-action: none; background: #fff; }
        .separator { width: 1px; height: 30px; background: #eee; margin: 0 5px; }
    </style>
</head>
<body>

<div id="toolbar">
    <button class="tool-btn" data-tool="hand" title="Рука">✋</button>
    <button class="tool-btn" data-tool="select" title="Виділення">↖️</button>
    <div class="separator"></div>
    <button class="tool-btn active" data-tool="pen">✏️</button>
    
    <div class="shapes-wrapper">
        <button class="tool-btn" id="shapesBtn">🔷 Фігури ▾</button>
        <div id="shapes-menu">
            <div class="shape-category">
                <div class="category-title">Геометрія</div>
                <div class="shape-grid">
                    <div class="shape-item" data-shape="rect">⬜</div>
                    <div class="shape-item" data-shape="circle">⭕</div>
                    <div class="shape-item" data-shape="triangle">🔺</div>
                    <div class="shape-item" data-shape="line">📏</div>
                    <div class="shape-item" data-shape="arrow">➡️</div>
                    <div class="shape-item" data-shape="cube">🧊</div>
                    <div class="shape-item" data-shape="cylinder">🛢️</div>
                    <div class="shape-item" data-shape="ruler">📏</div>
                </div>
            </div>
        </div>
    </div>

    <button class="tool-btn" data-tool="text">Текст</button>
    <button class="tool-btn" data-tool="eraser">🧹</button>
    
    <div class="separator"></div>
    <input type="color" id="colorPicker" value="#212529">
    <input type="range" id="lineWidth" min="1" max="20" value="3">
    <div class="separator"></div>
    <button class="tool-btn" onclick="createNewBoard()">➕ Нова</button>
    <button class="tool-btn" id="clearBtn" style="color: #dc3545;">🗑️</button>
</div>

<div id="zoom-display">100%</div>
<canvas id="board"></canvas>

<script>
const boardId = window.location.pathname.replace('/', '') || 'main';
const socket = io({ query: { boardId } });
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const shapesMenu = document.getElementById('shapes-menu');

let scale = 1.0, offsetX = 0, offsetY = 0;
let objects = [], currentTool = 'pen', activeShape = 'rect', isDrawing = false, currentObj = null;
let selectedObjects = [], selectionBox = null, dragMode = null, resizeHandleObj = null;
let lastX, lastY;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener('resize', resize);
resize();

function createNewBoard() {
    window.location.href = '/' + Math.random().toString(36).substring(2, 9);
}

function drawGrid() {
    const size = 50 * scale;
    ctx.beginPath();
    ctx.strokeStyle = '#f0f2f5';
    ctx.lineWidth = 1;
    for (let x = offsetX % size; x < canvas.width; x += size) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
    for (let y = offsetY % size; y < canvas.height; y += size) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
    ctx.stroke();
}

function drawObject(obj) {
    ctx.save();
    ctx.lineWidth = obj.width * scale;
    ctx.strokeStyle = obj.color;
    ctx.fillStyle = obj.color;
    
    const sX = obj.x * scale + offsetX;
    const sY = obj.y * scale + offsetY;
    const eX = obj.ex * scale + offsetX;
    const eY = obj.ey * scale + offsetY;
    const w = (obj.ex - obj.x) * scale;
    const h = (obj.ey - obj.y) * scale;

    ctx.beginPath();
    if (obj.type === 'pen') {
        ctx.moveTo(sX, sY);
        obj.points?.forEach(p => ctx.lineTo(p.x * scale + offsetX, p.y * scale + offsetY));
        ctx.stroke();
    } else if (obj.type === 'text') {
        ctx.font = `${obj.fontSize * scale}px Arial`;
        ctx.textBaseline = 'top';
        const lines = obj.text.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, sX, sY + (i * obj.fontSize * 1.2 * scale));
        });
    } else if (obj.type === 'shape') {
        switch(obj.shape) {
            case 'rect': ctx.strokeRect(sX, sY, w, h); break;
            case 'circle':
                ctx.ellipse(sX + w/2, sY + h/2, Math.abs(w/2), Math.abs(h/2), 0, 0, Math.PI * 2);
                ctx.stroke(); break;
            case 'line':
            case 'arrow':
                ctx.moveTo(sX, sY); ctx.lineTo(eX, eY); ctx.stroke();
                if (obj.shape === 'arrow') {
                    const angle = Math.atan2(eY - sY, eX - sX);
                    ctx.lineTo(eX - 15*scale * Math.cos(angle - 0.5), eY - 15*scale * Math.sin(angle - 0.5));
                    ctx.moveTo(eX, eY);
                    ctx.lineTo(eX - 15*scale * Math.cos(angle + 0.5), eY - 15*scale * Math.sin(angle + 0.5));
                    ctx.stroke();
                } break;
            case 'triangle':
                ctx.moveTo(sX + w/2, sY); ctx.lineTo(sX + w, sY + h); ctx.lineTo(sX, sY + h); ctx.closePath(); ctx.stroke(); break;
            case 'cube':
                const d = w * 0.3;
                ctx.strokeRect(sX, sY + d, w - d, h - d);
                ctx.strokeRect(sX + d, sY, w - d, h - d);
                ctx.moveTo(sX, sY + d); ctx.lineTo(sX + d, sY);
                ctx.moveTo(sX + w - d, sY + d); ctx.lineTo(sX + w, sY);
                ctx.moveTo(sX, sY + h); ctx.lineTo(sX + d, sY + h - d);
                ctx.moveTo(sX + w - d, sY + h); ctx.lineTo(sX + w, sY + h - d);
                ctx.stroke(); break;
            case 'cylinder':
                ctx.ellipse(sX + w/2, sY, Math.abs(w/2), Math.abs(h * 0.1), 0, 0, Math.PI * 2);
                ctx.ellipse(sX + w/2, sY + h, Math.abs(w/2), Math.abs(h * 0.1), 0, 0, Math.PI * 2);
                ctx.moveTo(sX, sY); ctx.lineTo(sX, sY + h); ctx.moveTo(sX + w, sY); ctx.lineTo(sX + w, sY + h);
                ctx.stroke(); break;
            case 'ruler':
                ctx.strokeRect(sX, sY, w, h);
                for(let i=0; i<Math.abs(w); i+=10*scale) {
                    ctx.moveTo(sX + i * Math.sign(w), sY);
                    ctx.lineTo(sX + i * Math.sign(w), sY + (i % 50 === 0 ? 15 : 7) * scale);
                }
                ctx.stroke(); break;
        }
    }
    
    if (selectedObjects.includes(obj)) {
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#007bff';
        ctx.strokeRect(sX - 4, sY - 4, w + 8, h + 8);
        ctx.setLineDash([]);
        ctx.fillStyle = '#fff';
        ctx.strokeRect(eX - 5, eY - 5, 10, 10);
        ctx.fillRect(eX - 5, eY - 5, 10, 10);
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    objects.forEach(drawObject);
    if (currentObj) drawObject(currentObj);
    if (selectionBox) {
        ctx.strokeStyle = 'rgba(0,123,255,0.4)';
        ctx.fillStyle = 'rgba(0,123,255,0.1)';
        ctx.strokeRect(selectionBox.x*scale+offsetX, selectionBox.y*scale+offsetY, selectionBox.w*scale, selectionBox.h*scale);
        ctx.fillRect(selectionBox.x*scale+offsetX, selectionBox.y*scale+offsetY, selectionBox.w*scale, selectionBox.h*scale);
    }
}

function getCoords(e) {
    const t = e.touches ? e.touches : e;
    return { 
        x: (t.clientX - offsetX) / scale, 
        y: (t.clientY - offsetY) / scale,
        rawX: t.clientX, rawY: t.clientY
    };
}

window.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const oldScale = scale;
    const newScale = Math.min(Math.max(scale * delta, 0.5), 2.0);
    if (newScale !== oldScale) {
        scale = newScale;
        offsetX = e.clientX - (e.clientX - offsetX) * (scale / oldScale);
        offsetY = e.clientY - (e.clientY - offsetY) * (scale / oldScale);
        document.getElementById('zoom-display').innerText = `${Math.round(scale * 100)}%`;
        draw();
    }
}, { passive: false });

// --- ОНОВЛЕНИЙ ТЕКСТ (Enter = новий рядок, автоматичне розтягування) ---
function startTextInput(c) {
    const field = document.createElement('div');
    field.className = 'text-input-field';
    field.contentEditable = true;
    field.style.left = c.rawX + 'px';
    field.style.top = c.rawY + 'px';
    field.style.fontSize = (20 * scale) + 'px';
    field.style.color = document.getElementById('colorPicker').value;
    
    document.body.appendChild(field);
    field.focus();

    field.onblur = () => {
        if (field.innerText.trim()) {
            const obj = {
                type: 'text',
                text: field.innerText, // Зберігає текст з переносами \n
                x: c.x, y: c.y,
                ex: c.x + (field.offsetWidth / scale),
                ey: c.y + (field.offsetHeight / scale),
                color: field.style.color,
                fontSize: 20,
                width: 2
            };
            objects.push(obj);
            socket.emit('new-object', obj);
        }
        if (field.parentNode) document.body.removeChild(field);
        draw();
    };

    field.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            // Дозволяємо стандартну поведінку (новий рядок), 
            // але blur спрацює тільки якщо користувач клікне інде.
            // Якщо хочете завершувати по Enter, додайте field.blur() тут.
        }
    };
}

canvas.onmousedown = (e) => {
    const c = getCoords(e);
    lastX = c.rawX; lastY = c.rawY;
    isDrawing = true;

    if (currentTool === 'hand') { dragMode = 'pan'; return; }
    if (currentTool === 'text') { startTextInput(c); isDrawing = false; return; }

    if (currentTool === 'select') {
        const resHit = selectedObjects.find(o => Math.hypot(o.ex*scale+offsetX - c.rawX, o.ey*scale+offsetY - c.rawY) < 15);
        if (resHit) { dragMode = 'resize'; resizeHandleObj = resHit; return; }

        const hit = [...objects].reverse().find(o => c.x > Math.min(o.x, o.ex) && c.x < Math.max(o.x, o.ex) && c.y > Math.min(o.y, o.ey) && c.y < Math.max(o.y, o.ey));
        if (hit) { selectedObjects = [hit]; dragMode = 'move'; } 
        else { selectedObjects = []; dragMode = 'area'; selectionBox = { x: c.x, y: c.y, w: 0, h: 0 }; }
        draw(); return;
    }

    if (currentTool === 'eraser') {
        objects = objects.filter(o => Math.hypot(o.x - c.x, o.y - c.y) > 25/scale);
        socket.emit('update-all', objects); isDrawing = false; draw(); return;
    }

    currentObj = {
        type: currentTool === 'pen' ? 'pen' : 'shape',
        shape: activeShape, x: c.x, y: c.y, ex: c.x, ey: c.y,
        color: document.getElementById('colorPicker').value,
        width: document.getElementById('lineWidth').value,
        points: currentTool === 'pen' ? [{x: c.x, y: c.y}] : null
    };
};

window.onmousemove = (e) => {
    if (!isDrawing) return;
    const c = getCoords(e);
    const dx = (c.rawX - lastX) / scale;
    const dy = (c.rawY - lastY) / scale;

    if (dragMode === 'pan' || currentTool === 'hand') {
        offsetX += (c.rawX - lastX); offsetY += (c.rawY - lastY);
    } else if (dragMode === 'move') {
        selectedObjects.forEach(o => { o.x += dx; o.y += dy; o.ex += dx; o.ey += dy; if(o.points) o.points.forEach(p=>{p.x+=dx;p.y+=dy;}); });
    } else if (dragMode === 'resize' && resizeHandleObj) {
        resizeHandleObj.ex = c.x; resizeHandleObj.ey = c.y;
    } else if (dragMode === 'area') {
        selectionBox.w = c.x - selectionBox.x; selectionBox.h = c.y - selectionBox.y;
    } else if (currentTool === 'pen') {
        currentObj.points.push({x: c.x, y: c.y}); currentObj.ex = c.x; currentObj.ey = c.y;
    } else if (currentObj) {
        currentObj.ex = c.x; currentObj.ey = c.y;
    }
    lastX = c.rawX; lastY = c.rawY; draw();
};

window.onmouseup = () => {
    if (dragMode === 'area') {
        const x1 = Math.min(selectionBox.x, selectionBox.x + selectionBox.w);
        const x2 = Math.max(selectionBox.x, selectionBox.x + selectionBox.w);
        const y1 = Math.min(selectionBox.y, selectionBox.y + selectionBox.h);
        const y2 = Math.max(selectionBox.y, selectionBox.y + selectionBox.h);
        selectedObjects = objects.filter(o => o.x > x1 && o.x < x2 && o.y > y1 && o.y < y2);
    }
    if (currentObj) { objects.push(currentObj); socket.emit('new-object', currentObj); }
    if (dragMode && dragMode !== 'pan') socket.emit('update-all', objects);
    isDrawing = false; currentObj = null; selectionBox = null; dragMode = null; resizeHandleObj = null;
    draw();
};

document.getElementById('shapesBtn').onclick = (e) => { e.stopPropagation(); shapesMenu.classList.toggle('show'); };
document.querySelectorAll('.shape-item').forEach(i => i.onclick = () => { currentTool = 'shape'; activeShape = i.dataset.shape; updateUI('shapesBtn'); });
document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.onclick = () => { currentTool = b.dataset.tool; updateUI(b); });

function updateUI(el) {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    (typeof el === 'string' ? document.getElementById(el) : el).classList.add('active');
    shapesMenu.classList.remove('show');
}

document.getElementById('clearBtn').onclick = () => { if(confirm("Очистити?")) { objects = []; socket.emit('delete-board'); draw(); }};
socket.on('init-history', h => { objects = h; draw(); });
socket.on('new-object', o => { objects.push(o); draw(); });
socket.on('update-all', o => { objects = o; draw(); });
socket.on('board-deleted', () => { objects = []; draw(); });

</script>
</body>
</html>
