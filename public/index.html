<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Совместная математическая доска</title>
    <script src="https://socket.io"></script>
    <script src="https://polyfill.io"></script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { display: block; }
        #math-buffer { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('latex')" id="latexBtn">f(x) LaTeX</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="clearBoard()" style="background:#e74c3c; color:white;">Очистить всё</button>
</div>

<div id="canvas-container"><canvas id="canvas"></canvas></div>
<div id="math-buffer"></div>

<script>
    const socket = io("https://onrender.com"); // Замените на ваш URL
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const mathBuffer = document.getElementById('math-buffer');
    
    let tool = 'pen', isDrawing = false, objects = [], currentObj = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.onresize = resize;
    resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
    }

    // Слушаем сервер: когда кто-то другой нарисовал объект
    socket.on('new-object', (obj) => {
        if (obj.type === 'latex') {
            loadRemoteLatex(obj);
        } else {
            objects.push(obj);
            render();
        }
    });

    socket.on('clear-board', () => { objects = []; render(); });

    async function addLatex(x, y) {
        const formula = prompt("LaTeX:", "a^2 + b^2 = c^2");
        if (!formula) return;
        const color = colorPicker.value;
        const obj = { type: 'latex', formula, x, y, color };
        
        // Рисуем у себя и отправляем другим данные (не картинку, а текст!)
        loadRemoteLatex(obj);
        socket.emit('new-object', obj);
    }

    async function loadRemoteLatex(obj) {
        mathBuffer.innerHTML = `\\(\\color{${obj.color}}{${obj.formula}}\\)`;
        await MathJax.typesetPromise([mathBuffer]);
        const svg = mathBuffer.querySelector('svg');
        const svgData = new XMLSerializer().serializeToString(svg);
        const img = new Image();
        img.onload = () => {
            objects.push({ type: 'image', img, x: obj.x, y: obj.y, w: svg.clientWidth * 1.5, h: svg.clientHeight * 1.5 });
            render();
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objects.forEach(draw);
        if (currentObj) draw(currentObj);
    }

    function draw(obj) {
        ctx.strokeStyle = obj.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        if (obj.type === 'pen') {
            obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        } else if (obj.type === 'rect') {
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'image') {
            ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
        }
        ctx.stroke();
    }

    canvas.onmousedown = (e) => {
        isDrawing = true;
        const mX = e.clientX, mY = e.clientY - 50;
        if (tool === 'latex') { addLatex(mX, mY); isDrawing = false; return; }
        currentObj = tool === 'pen' ? 
            { type: 'pen', color: colorPicker.value, points: [{x: mX, y: mY}] } :
            { type: 'rect', color: colorPicker.value, x: mX, y: mY, w: 0, h: 0 };
    };

    window.onmousemove = (e) => {
        if (!isDrawing || !currentObj) return;
        const mX = e.clientX, mY = e.clientY - 50;
        if (tool === 'pen') currentObj.points.push({x: mX, y: mY});
        else { currentObj.w = mX - currentObj.x; currentObj.h = mY - currentObj.y; }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) {
            objects.push(currentObj);
            socket.emit('new-object', currentObj);
        }
        isDrawing = false; currentObj = null;
    };

    function clearBoard() {
        objects = []; render();
        socket.emit('clear-board');
    }
</script>
</body>
</html>
