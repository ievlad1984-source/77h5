<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Whiteboard Pro + Math Formulas</title>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Підключаємо MathJax для рендерингу формул -->
    <script src="https://polyfill.io"></script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; transition: 0.2s; font-size: 13px; }
        button:hover { background: #bdc3c7; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; overflow: hidden; }
        canvas { display: block; background: white; }
        .status-bar { position: absolute; bottom: 15px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 6px 18px; border-radius: 20px; font-size: 12px; pointer-events: none; z-index: 20; }
        /* Прихований контейнер для рендерингу MathJax */
        #math-buffer { position: absolute; visibility: hidden; top: 0; left: 0; background: white; padding: 10px; }
    </style>
</head>
<body>

<div id="math-buffer"></div>

<div class="toolbar">
    <button onclick="setTool('select')" id="selectBtn" class="active">🔦 Вибір</button>
    <button onclick="setTool('pen')" id="penBtn">✏️ Ручка</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Квадрат</button>
    <button onclick="addFormula()" id="formulaBtn" style="background: #9b59b6; color: white;">Σ Формула</button>
    
    <input type="color" id="colorPicker" value="#000000">
    <div style="flex-grow: 1;"></div>
    <button onclick="undo()" style="background:#f39c12; color:white;">↩️ Відміна</button>
    <button onclick="clearBoard()" style="background:#e74c3c; color:white;">Очистити</button>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div class="status-bar" id="infoBar">Формули в форматі LaTeX (напр. \frac{a}{b}). Натисніть Σ, щоб додати.</div>
</div>

<script>
    const boardId = window.location.pathname.split('/').pop() || 'main';
    const socket = io({ query: { boardId } });
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    
    let tool = 'select', objects = [], scale = 1, offsetX = 0, offsetY = 0;
    let selectedObjects = [], isDrawing = false, currentObj = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.querySelector('.toolbar').offsetHeight;
        render();
    }
    window.onresize = resize; resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        render();
    }

    // --- ФУНКЦІЯ ДОДАВАННЯ ФОРМУЛИ ---
    async function addFormula() {
        const latex = prompt("Введіть формулу LaTeX (наприклад: E=mc^2 або \\frac{a}{b}):", "x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}");
        if (!latex) return;

        const buffer = document.getElementById('math-buffer');
        buffer.innerHTML = `\\(${latex}\\)`;
        
        // Рендеримо LaTeX через MathJax
        await MathJax.typesetPromise([buffer]);
        
        // Конвертуємо зрендерену формулу в картинку (SVG -> Image)
        const svg = buffer.querySelector('svg');
        const svgData = new XMLSerializer().serializeToString(svg);
        const canvasTmp = document.createElement('canvas');
        const svgSize = svg.getBoundingClientRect();
        
        const img = new Image();
        img.onload = () => {
            const obj = {
                type: 'image',
                src: img.src,
                x: (canvas.width/2 - offsetX) / scale,
                y: (canvas.height/2 - offsetY) / scale,
                w: svgSize.width * 1.5,
                h: svgSize.height * 1.5,
                angle: 0,
                isFormula: true
            };
            objects.push(obj);
            socket.emit('new-object', obj);
            render();
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }

    // --- ІСНУЮЧА ЛОГІКА МАЛЮВАННЯ ТА ВИБОРУ ---
    function getCoords(e) {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left - offsetX) / scale, y: (e.clientY - r.top - offsetY) / scale };
    }

    canvas.onmousedown = (e) => {
        const p = getCoords(e); isDrawing = true;
        if (tool === 'select') {
            selectedObjects = objects.slice().reverse().filter(o => {
                return p.x >= o.x && p.x <= o.x + o.w && p.y >= o.y && p.y <= o.y + o.h;
            }).slice(0,1);
            render();
        } else if (tool === 'pen') {
            currentObj = { type: 'pen', color: document.getElementById('colorPicker').value, lineWidth: 3, points: [p], angle: 0 };
        } else if (tool === 'rect') {
            currentObj = { type: 'rect', x: p.x, y: p.y, w: 0, h: 0, color: document.getElementById('colorPicker').value, lineWidth: 3, angle: 0 };
        }
    };

    window.onmousemove = (e) => {
        if (!isDrawing || !currentObj) return;
        const p = getCoords(e);
        if (currentObj.type === 'pen') currentObj.points.push(p);
        else { currentObj.w = p.x - currentObj.x; currentObj.h = p.y - currentObj.y; }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) { objects.push(currentObj); socket.emit('new-object', currentObj); }
        isDrawing = false; currentObj = null; render();
    };

    function draw(obj) {
        ctx.save();
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; ctx.lineWidth = obj.lineWidth;
        if (obj.type === 'pen') {
            ctx.beginPath(); obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.stroke();
        } else if (obj.type === 'rect') ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        else if (obj.type === 'image') {
            const i = new Image(); i.src = obj.src; 
            if(i.complete) ctx.drawImage(i, obj.x, obj.y, obj.w, obj.h); else i.onload = render;
        }
        if (selectedObjects.includes(obj)) {
            ctx.setLineDash([5,5]); ctx.strokeStyle = '#3498db'; ctx.strokeRect(obj.x-5, obj.y-5, obj.w+10, obj.h+10);
        }
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
        objects.forEach(draw); if(currentObj) draw(currentObj);
        ctx.restore();
    }

    window.onkeydown = (e) => {
        if (e.code === 'Delete') { objects = objects.filter(o => !selectedObjects.includes(o)); selectedObjects = []; socket.emit('full-update', objects); render(); }
    };

    socket.on('init-history', h => { objects = h; render(); });
    socket.on('new-object', o => { objects.push(o); render(); });
    socket.on('full-update', h => { objects = h; render(); });
    function undo() { objects.pop(); socket.emit('undo'); render(); }
    function clearBoard() { objects = []; socket.emit('clear-board'); render(); }
</script>
</body>
</html>
