<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Математическая доска</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; flex-wrap: wrap; }
        button { cursor: pointer; padding: 6px 10px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { display: block; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('hand')" id="handBtn">✋ Рука</button>
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('text')" id="textBtn">Текст</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜</button>
    <button onclick="setTool('circle')" id="circleBtn">⭕</button>
    <button onclick="setTool('line')" id="lineBtn">📏</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="objects=[]; render();" style="background:#e74c3c; color:white;">Очистить</button>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const colorPicker = document.getElementById('colorPicker');

    let tool = 'pen';
    let isDrawing = false;
    let offsetX = 0, offsetY = 0; 
    let objects = []; 
    let currentObj = null;

    function resize() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        render();
    }
    window.onresize = resize;
    resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        canvas.style.cursor = (t === 'hand') ? 'grab' : 'crosshair';
    }

    function addText(x, y) {
        const content = prompt("Введите ваш текст:");
        if (!content) return;

        objects.push({
            type: 'text',
            content: content,
            x: x,
            y: y,
            color: colorPicker.value,
            font: "20px Arial"
        });
        render();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);

        // Сетка
        const gridSize = 30;
        ctx.beginPath();
        ctx.strokeStyle = '#eee';
        for (let x = -offsetX % gridSize; x < canvas.width - offsetX; x += gridSize) {
            ctx.moveTo(x, -offsetY); ctx.lineTo(x, canvas.height - offsetY);
        }
        for (let y = -offsetY % gridSize; y < canvas.height - offsetY; y += gridSize) {
            ctx.moveTo(-offsetX, y); ctx.lineTo(canvas.width - offsetX, y);
        }
        ctx.stroke();

        objects.forEach(draw);
        if (currentObj) draw(currentObj);

        ctx.restore();
    }

    function draw(obj) {
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        
        if (obj.type === 'pen') {
            ctx.beginPath();
            obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
        } else if (obj.type === 'rect') {
            ctx.beginPath();
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'circle') {
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, Math.abs(obj.r), 0, Math.PI*2);
            ctx.stroke();
        } else if (obj.type === 'line') {
            ctx.beginPath();
            ctx.moveTo(obj.x1, obj.y1);
            ctx.lineTo(obj.x2, obj.y2);
            ctx.stroke();
        } else if (obj.type === 'text') {
            ctx.font = obj.font;
            ctx.fillText(obj.content, obj.x, obj.y);
        } else if (obj.type === 'image') {
            ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
        }
    }

    canvas.onmousedown = (e) => {
        const mX = e.offsetX - offsetX;
        const mY = e.offsetY - offsetY;

        if (tool === 'text') {
            addText(mX, mY);
            return;
        }

        isDrawing = true;
        if (tool === 'hand') {
            canvas.style.cursor = 'grabbing';
        } else if (tool === 'pen') {
            currentObj = { type: 'pen', color: colorPicker.value, points: [{x: mX, y: mY}] };
        } else {
            currentObj = { type: tool, color: colorPicker.value, x: mX, y: mY, x1: mX, y1: mY, w: 0, h: 0, r: 0 };
        }
    };

    window.onmousemove = (e) => {
        if (!isDrawing) return;
        if (tool === 'hand') {
            offsetX += e.movementX;
            offsetY += e.movementY;
        } else if (currentObj) {
            const mX = e.offsetX - offsetX;
            const mY = e.offsetY - offsetY;
            if (tool === 'pen') currentObj.points.push({x: mX, y: mY});
            if (tool === 'rect') { currentObj.w = mX - currentObj.x; currentObj.h = mY - currentObj.y; }
            if (tool === 'line') { currentObj.x2 = mX; currentObj.y2 = mY; }
            if (tool === 'circle') currentObj.r = Math.sqrt((mX-currentObj.x)**2 + (mY-currentObj.y)**2);
        }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) objects.push(currentObj);
        isDrawing = false;
        currentObj = null;
        if (tool === 'hand') canvas.style.cursor = 'grab';
        render();
    };

    window.onpaste = (e) => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.includes('image'));
        if (item) {
            const img = new Image();
            img.onload = () => {
                objects.push({ type: 'image', img: img, x: 20 - offsetX, y: 20 - offsetY, w: img.width/2, h: img.height/2 });
                render();
            };
            img.src = URL.createObjectURL(item.getAsFile());
        }
    };
</script>

</body>
</html>
