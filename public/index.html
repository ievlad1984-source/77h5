<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>iDroo Clone Pro - Full Realtime</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f0f0; }
        
        /* Панель інструментів у стилі Paint */
        #toolbar {
            position: absolute; top: 0; left: 0; width: 100%; background: #f5f6f7; 
            padding: 5px 15px; display: flex; gap: 12px; border-bottom: 1px solid #ccc;
            z-index: 100; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .tool-group { display: flex; gap: 4px; border-right: 1px solid #ddd; padding-right: 10px; align-items: center; }
        .tool-btn { 
            padding: 6px 10px; cursor: pointer; border: 1px solid transparent; 
            background: transparent; border-radius: 3px; font-size: 13px; display: flex; align-items: center; gap: 5px;
        }
        .tool-btn:hover { background: #e5f1fb; border-color: #a5d7ff; }
        .tool-btn.active { background: #cce4f7; border-color: #0056b3; font-weight: bold; }
        
        #zoom-display { position: absolute; bottom: 20px; right: 20px; background: white; padding: 5px 12px; border-radius: 4px; font-size: 12px; border: 1px solid #ccc; z-index: 100; }
        #status-bar { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.8); padding: 5px 12px; border-radius: 4px; font-size: 12px; z-index: 100; }
        
        canvas { display: block; background: #fff; touch-action: none; }
        
        .text-input-div {
            position: absolute; min-width: 10px; outline: 2px dashed #007bff; background: white;
            white-space: pre; font-family: Arial; padding: 2px; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="tool-group">
        <button class="tool-btn" data-tool="select">🔍 Виділення</button>
        <button class="tool-btn" data-tool="hand">✋ Рука</button>
    </div>
    <div class="tool-group">
        <button class="tool-btn active" data-tool="pen">✏️ Олівець</button>
        <button class="tool-btn" data-tool="line">📏 Лінія</button>
        <button class="tool-btn" data-tool="rect">⬜ Прямокутник</button>
        <button class="tool-btn" data-tool="text">Txt</button>
        <button class="tool-btn" data-tool="eraser">🧽 Ластик</button>
    </div>
    <div class="tool-group">
        <input type="color" id="colorPicker" value="#000000" title="Колір">
        <input type="range" id="lineWidth" min="1" max="20" value="3" title="Товщина">
    </div>
    <div class="tool-group">
        <button class="tool-btn" onclick="socket.emit('undo')">↩ Undo</button>
    </div>
    <button class="tool-btn" onclick="copyInvite()" style="margin-left: auto; background: #007bff; color: white;">🔗 Запросити друга</button>
</div>

<div id="status-bar">ID дошки: <span id="board-id-display">...</span></div>
<div id="zoom-display">100%</div>
<canvas id="board"></canvas>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    
    // Отримуємо ID дошки з URL
    const boardId = window.location.pathname.substring(1) || 'main';
    document.getElementById('board-id-display').innerText = boardId;

    // Підключення до твого сервера
    const socket = io({ query: { boardId } });

    let objects = []; 
    let remoteDrawings = {}; // Чернетки інших користувачів
    let currentTool = 'pen', isDrawing = false, currentObj = null;
    let selectedObjects = [], selectionRect = null;
    let scale = 1.0, offsetX = 0, offsetY = 0;
    let dragStartX, dragStartY, clipboard = [];

    // --- СЕРВЕРНІ ПОДІЇ ---

    socket.on('init-history', (data) => {
        objects = data.map(processIncomingObj);
        draw();
    });

    socket.on('new-object', (obj) => {
        objects.push(processIncomingObj(obj));
        draw();
    });

    socket.on('drawing-progress', (data) => {
        remoteDrawings[data.userId] = data;
        draw();
    });

    socket.on('clear-progress', (userId) => {
        delete remoteDrawings[userId];
        draw();
    });

    function processIncomingObj(obj) {
        if (obj.type === 'image') {
            const img = new Image();
            img.src = obj.imgSrc;
            img.onload = draw;
            return { ...obj, img };
        }
        return obj;
    }

    // --- МАЛЮВАННЯ ---

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', resize);
    resize();

    function getCoords(e) {
        return { x: (e.clientX - offsetX) / scale, y: (e.clientY - offsetY) / scale };
    }

    function isPointInObj(coords, obj) {
        const margin = 10;
        const x1 = Math.min(obj.x, obj.ex ?? obj.x) - margin;
        const x2 = Math.max(obj.x, obj.ex ?? obj.x + 50) + margin;
        const y1 = Math.min(obj.y, obj.ey ?? obj.y) - margin;
        const y2 = Math.max(obj.y, obj.ey ?? obj.y + 20) + margin;
        return coords.x >= x1 && coords.x <= x2 && coords.y >= y1 && coords.y <= y2;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Малюємо сітку
        drawGrid();

        // Об'єднуємо всі об'єкти: постійні + чернетки інших + наш поточний
        const allToDraw = [...objects, ...Object.values(remoteDrawings)];
        if (currentObj) allToDraw.push(currentObj);

        allToDraw.forEach(obj => {
            const isSel = selectedObjects.includes(obj);
            ctx.lineWidth = obj.width || 3;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isSel ? '#007bff' : (obj.type === 'eraser' ? '#fff' : obj.color);
            ctx.fillStyle = obj.color;

            ctx.beginPath();
            if (obj.type === 'pen' || obj.type === 'eraser') {
                if (obj.points?.length > 0) {
                    ctx.moveTo(obj.points[0].x, obj.points[0].y);
                    obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.stroke();
                }
            } else if (obj.type === 'line') {
                ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.ex, obj.ey); ctx.stroke();
            } else if (obj.type === 'rect') {
                ctx.strokeRect(obj.x, obj.y, obj.ex - obj.x, obj.ey - obj.y);
            } else if (obj.type === 'text') {
                ctx.font = `${obj.size}px Arial`;
                ctx.fillText(obj.text, obj.x, obj.y + obj.size);
            } else if (obj.type === 'image' && obj.img) {
                ctx.drawImage(obj.img, obj.x, obj.y, obj.ex - obj.x, obj.ey - obj.y);
            }

            if (isSel) {
                ctx.save();
                ctx.setLineDash([5/scale, 5/scale]);
                ctx.lineWidth = 1/scale;
                ctx.strokeStyle = '#007bff';
                ctx.strokeRect(Math.min(obj.x, obj.ex??obj.x)-5, Math.min(obj.y, obj.ey??obj.y)-5, Math.abs((obj.ex??obj.x+100)-obj.x)+10, Math.abs((obj.ey??obj.y+30)-obj.y)+10);
                ctx.restore();
            }
        });

        if (selectionRect) {
            ctx.strokeStyle = 'rgba(0, 123, 255, 0.8)';
            ctx.fillStyle = 'rgba(0, 123, 255, 0.1)';
            ctx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
            ctx.fillRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
        }
        ctx.restore();
    }

    function drawGrid() {
        const size = 50;
        ctx.beginPath();
        ctx.strokeStyle = '#f0f0f0';
        ctx.lineWidth = 1/scale;
        const left = -offsetX/scale, top = -offsetY/scale;
        const right = (canvas.width-offsetX)/scale, bottom = (canvas.height-offsetY)/scale;
        for (let x = left - (left%size); x < right; x += size) { ctx.moveTo(x, top); ctx.lineTo(x, bottom); }
        for (let y = top - (top%size); y < bottom; y += size) { ctx.moveTo(left, y); ctx.lineTo(right, y); }
        ctx.stroke();
    }

    // --- ВЗАЄМОДІЯ ---

    canvas.onmousedown = (e) => {
        const coords = getCoords(e);
        isDrawing = true;
        dragStartX = coords.x; dragStartY = coords.y;

        if (currentTool === 'select') {
            const hit = [...objects].reverse().find(o => isPointInObj(coords, o));
            if (hit) {
                if (!selectedObjects.includes(hit)) selectedObjects = [hit];
            } else {
                selectedObjects = [];
                selectionRect = { x: coords.x, y: coords.y, w: 0, h: 0 };
            }
            draw(); return;
        }

        if (currentTool === 'text') {
            const val = prompt("Текст:");
            if (val) {
                const obj = { type: 'text', x: coords.x, y: coords.y, text: val, size: 20, color: document.getElementById('colorPicker').value };
                socket.emit('new-object', obj);
                objects.push(obj);
            }
            isDrawing = false; draw(); return;
        }

        currentObj = {
            type: currentTool, x: coords.x, y: coords.y, ex: coords.x, ey: coords.y,
            color: document.getElementById('colorPicker').value,
            width: parseInt(document.getElementById('lineWidth').value),
            points: [{x: coords.x, y: coords.y}]
        };
    };

    window.onmousemove = (e) => {
        if (!isDrawing) return;
        const coords = getCoords(e);

        if (currentTool === 'hand') {
            offsetX += e.movementX; offsetY += e.movementY;
        } else if (currentTool === 'select') {
            if (selectionRect) {
                selectionRect.w = coords.x - selectionRect.x;
                selectionRect.h = coords.y - selectionRect.y;
            } else {
                const dx = coords.x - dragStartX, dy = coords.y - dragStartY;
                selectedObjects.forEach(obj => {
                    obj.x += dx; obj.y += dy;
                    if (obj.ex !== undefined) obj.ex += dx;
                    if (obj.ey !== undefined) obj.ey += dy;
                    obj.points?.forEach(p => { p.x += dx; p.y += dy; });
                });
                dragStartX = coords.x; dragStartY = coords.y;
            }
        } else if (currentObj) {
            if (currentTool === 'pen' || currentTool === 'eraser') currentObj.points.push({x: coords.x, y: coords.y});
            else { currentObj.ex = coords.x; currentObj.ey = coords.y; }
            socket.emit('drawing-progress', currentObj);
        }
        draw();
    };

    window.onmouseup = () => {
        if (selectionRect) {
            const x1 = Math.min(selectionRect.x, selectionRect.x + selectionRect.w);
            const x2 = Math.max(selectionRect.x, selectionRect.x + selectionRect.w);
            const y1 = Math.min(selectionRect.y, selectionRect.y + selectionRect.h);
            const y2 = Math.max(selectionRect.y, selectionRect.y + selectionRect.h);
            selectedObjects = objects.filter(o => o.x >= x1 && o.x <= x2 && o.y >= y1 && o.y <= y2);
            selectionRect = null;
        } else if (currentTool === 'select' && selectedObjects.length > 0) {
            socket.emit('update-all', objects); // Синхронізуємо переміщені об'єкти
        } else if (currentObj) {
            socket.emit('new-object', currentObj);
            objects.push(currentObj);
        }
        isDrawing = false; currentObj = null; draw();
    };

    // Зум коліщатком
    canvas.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const oldScale = scale;
        scale = Math.min(Math.max(scale * delta, 0.1), 5);
        offsetX = e.clientX - (e.clientX - offsetX) * (scale / oldScale);
        offsetY = e.clientY - (e.clientY - offsetY) * (scale / oldScale);
        document.getElementById('zoom-display').innerText = `${Math.round(scale * 100)}%`;
        draw();
    };

    // ГАРЯЧІ КЛАВІШІ
    window.onkeydown = (e) => {
        const ctrl = e.ctrlKey || e.metaKey;
        if (ctrl && e.key === 'a') { e.preventDefault(); selectedObjects = [...objects]; draw(); }
        if (ctrl && e.key === 'c') clipboard = JSON.parse(JSON.stringify(selectedObjects));
        if (ctrl && e.key === 'v') {
            const pasted = clipboard.map(o => ({ ...o, x: o.x+20, y: o.y+20, ex: o.ex?o.ex+20:undefined, ey: o.ey?o.ey+20:undefined, points: o.points?o.points.map(p=>({x:p.x+20,y:p.y+20})):undefined }));
            pasted.forEach(p => socket.emit('new-object', p));
            objects.push(...pasted); draw();
        }
        if (ctrl && e.key === 'z') socket.emit('undo');
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedObjects.length > 0) {
            objects = objects.filter(o => !selectedObjects.includes(o));
            socket.emit('update-all', objects);
            selectedObjects = []; draw();
        }
    };

    // ВСТАВКА КАРТИНКИ
    window.onpaste = (e) => {
        const item = Array.from(e.clipboardData.items).find(i => i.type.includes('image'));
        if (item) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const obj = { type: 'image', x: -offsetX/scale+50, y: -offsetY/scale+50, imgSrc: ev.target.result, ex: -offsetX/scale+50+img.width/2, ey: -offsetY/scale+50+img.height/2 };
                    socket.emit('new-object', obj);
                    objects.push({ ...obj, img });
                    draw();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(item.getAsFile());
        }
    };

    function copyInvite() {
        navigator.clipboard.writeText(window.location.href);
        alert("Посилання скопійовано! Відправ його другу.");
    }

    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
        };
    });
</script>
</body>
</html>
