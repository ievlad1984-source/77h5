<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iDroo Clone Pro - Ultimate</title>
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- KaTeX для формул -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f0f0f0; }
        
        #toolbar {
            position: absolute; top: 0; left: 0; width: 100%; background: #f5f6f7; 
            padding: 5px 15px; display: flex; gap: 12px; border-bottom: 1px solid #ccc;
            z-index: 100; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .tool-group { display: flex; gap: 6px; border-right: 2px solid #e0e0e0; padding-right: 12px; align-items: center; }
        .tool-btn { padding: 8px 12px; cursor: pointer; border: 1px solid transparent; background: transparent; border-radius: 4px; font-size: 14px; }
        .tool-btn:hover { background: #e5f1fb; border-color: #a5d7ff; }
        .tool-btn.active { background: #cce4f7; border-color: #0056b3; }
        
        #zoom-display { position: absolute; bottom: 25px; right: 25px; background: white; padding: 6px 15px; border: 1px solid #ccc; z-index: 100; border-radius: 20px; font-size: 12px; font-weight: bold; }
        canvas { display: block; background: #fff; touch-action: none; }
        
        /* Стиль для динамического ввода текста и формул */
        .dynamic-input {
            position: absolute; min-width: 50px; outline: 2px dashed #007bff; background: white;
            padding: 5px; z-index: 1000; white-space: pre-wrap; font-family: Arial; font-size: 20px;
            line-height: 1.2; color: black;
        }
        #math-preview {
            position: absolute; pointer-events: none; background: rgba(255,255,255,0.9);
            padding: 10px; border-radius: 4px; border: 1px solid #007bff; z-index: 1001; display: none;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="tool-group">
        <button class="tool-btn" onclick="window.location.href='/'" style="background: #28a745; color: white;">+ НОВАЯ</button>
    </div>
    <div class="tool-group">
        <button class="tool-btn" data-tool="select">🔍</button>
        <button class="tool-btn" data-tool="hand">✋</button>
        <button class="tool-btn active" data-tool="pen">✏️</button>
        <button class="tool-btn" data-tool="text">Текст</button>
        <button class="tool-btn" data-tool="math">f(x)</button>
        <button class="tool-btn" data-tool="eraser">🧽</button>
    </div>
    <div class="tool-group">
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="lineWidth" min="1" max="30" value="3">
    </div>
    <button class="tool-btn" onclick="socket.emit('undo')">↩ Отмена</button>
</div>

<div id="math-preview"></div>
<div id="zoom-display">100%</div>
<canvas id="board"></canvas>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const boardId = window.location.pathname.substring(1) || 'main';
    
    // Подключение к сокетам
    const socket = io({ 
        query: { boardId },
        transports: ['websocket', 'polling']
    });

    let objects = [], remoteDrawings = {};
    let currentTool = 'pen', isDrawing = false, currentObj = null;
    let scale = 1.0, offsetX = 0, offsetY = 0;
    let isTyping = false;

    // --- MATH HELPERS ---
    async function texToImg(tex, color) {
        const div = document.createElement('div');
        try {
            katex.render(tex, div, { displayMode: true });
            const svg = div.querySelector('svg');
            if (!svg) return null;
            svg.setAttribute('fill', color);
            const xml = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
            return new Promise(res => img.onload = () => res(img));
        } catch(e) { return null; }
    }

    // --- SOCKET EVENTS ---
    socket.on('init-history', async (data) => {
        objects = [];
        for (let o of data) objects.push(await processObj(o));
        draw();
    });

    socket.on('new-object', async (obj) => {
        objects.push(await processObj(obj));
        draw();
    });

    socket.on('drawing-progress', (data) => { remoteDrawings[data.userId] = data; draw(); });
    socket.on('clear-progress', (id) => { delete remoteDrawings[id]; draw(); });

    async function processObj(obj) {
        if (obj.type === 'math') obj.img = await texToImg(obj.tex, obj.color);
        return obj;
    }

    // --- DRAWING ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Сетка
        ctx.beginPath(); ctx.strokeStyle = '#f2f2f2'; ctx.lineWidth = 1/scale;
        for(let x=-2000; x<5000; x+=50) { ctx.moveTo(x, -2000); ctx.lineTo(x, 5000); }
        for(let y=-2000; y<5000; y+=50) { ctx.moveTo(-2000, y); ctx.lineTo(5000, y); }
        ctx.stroke();

        const all = [...objects, ...Object.values(remoteDrawings), ...(currentObj ? [currentObj] : [])];
        
        all.forEach(obj => {
            ctx.lineWidth = obj.width || 3;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = obj.type === 'eraser' ? '#fff' : obj.color;
            ctx.fillStyle = obj.color;

            if (obj.type === 'pen' || obj.type === 'eraser') {
                ctx.beginPath();
                if(obj.points?.length > 0) {
                    ctx.moveTo(obj.points[0].x, obj.points[0].y);
                    obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                }
                ctx.stroke();
            } else if (obj.type === 'text') {
                ctx.font = "20px Arial";
                obj.text.split('\n').forEach((line, i) => ctx.fillText(line, obj.x, obj.y + (i*24)));
            } else if (obj.type === 'math' && obj.img) {
                ctx.drawImage(obj.img, obj.x, obj.y, obj.img.width*0.6, obj.img.height*0.6);
            }
        });
        ctx.restore();
    }

    // --- INPUT HANDLER ---
    canvas.onmousedown = (e) => {
        if(isTyping) return;
        const worldCoords = { x: (e.clientX-offsetX)/scale, y: (e.clientY-offsetY)/scale };

        if(currentTool === 'text' || currentTool === 'math') {
            startInput(e.clientX, e.clientY, worldCoords, currentTool);
            return;
        }

        isDrawing = true;
        currentObj = { type: currentTool, points: [worldCoords], color: document.getElementById('colorPicker').value, width: document.getElementById('lineWidth').value };
    };

    function startInput(cx, cy, worldCoords, type) {
        isTyping = true;
        const input = document.createElement('div');
        input.className = 'dynamic-input';
        input.contentEditable = true;
        input.style.left = cx + 'px'; 
        input.style.top = cy + 'px';
        input.style.color = document.getElementById('colorPicker').value;
        document.body.appendChild(input);
        
        // Фокусируемся
        setTimeout(() => input.focus(), 10);

        const preview = document.getElementById('math-preview');
        
        if(type === 'math') {
            preview.style.display = 'block';
            input.oninput = () => {
                preview.style.left = input.style.left;
                preview.style.top = (parseInt(input.style.top) - 80) + 'px';
                try { katex.render(input.innerText, preview, { throwOnError: false }); } catch(e) {}
            };
        }

        // Завершение ввода при клике в сторону
        input.onblur = async () => {
            const val = input.innerText.trim();
            if(val) {
                const obj = { 
                    type, 
                    x: worldCoords.x, 
                    y: worldCoords.y, 
                    color: input.style.color 
                };
                if(type === 'text') obj.text = val;
                else obj.tex = val;
                
                const processed = await processObj(obj);
                objects.push(processed);
                socket.emit('new-object', obj);
            }
            document.body.removeChild(input);
            preview.style.display = 'none';
            isTyping = false; 
            draw();
        };

        // Завершение по Esc
        input.onkeydown = (e) => {
            if(e.key === 'Escape') input.blur();
        };
    }

    window.onmousemove = (e) => {
        if(!isDrawing || isTyping) return;
        const coords = { x: (e.clientX-offsetX)/scale, y: (e.clientY-offsetY)/scale };
        currentObj.points.push(coords);
        socket.emit('drawing-progress', currentObj);
        draw();
    };

    window.onmouseup = () => {
        if(currentObj) { 
            socket.emit('new-object', currentObj); 
            objects.push(currentObj); 
        }
        isDrawing = false; 
        currentObj = null; 
        draw();
    };

    // Зум
    window.onwheel = (e) => {
        if(isTyping) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.1, Math.min(5, scale * delta));
        document.getElementById('zoom-display').innerText = Math.round(scale * 100) + '%';
        draw();
    };

    // Переключение инструментов
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); 
            currentTool = btn.dataset.tool;
        };
    });

    window.onresize = () => { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
        draw(); 
    };
    window.onresize();
</script>
</body>
</html>
