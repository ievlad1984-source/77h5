            saveHistory();
            const editorDiv = textEditor.querySelector('.text-edit-content');
            const html = editorDiv.innerHTML;
            const segments = htmlToSegments(html);
            if (segments && segments.length > 0) {
                editingObject.segments = segments;
            } else {
                delete editingObject.segments;
            }
            editingObject.text = editorDiv.innerText;
            
            if (textEditor.parentNode) {
                document.body.removeChild(textEditor);
            }
            textEditor = null;
            
            startTextEdit(clickedText);
            requestDraw();
            return;
        }
    }
    
    if (textEditor) { 
        stopTextEdit(); 
        selectedObjects = [];
        requestDraw();
        return; 
    }
    
    if (currentTool === 'shape' && selectedShapeType) {
        startDrawing(coords);
        return;
    }

    if (currentTool !== 'select' && currentTool !== 'hand') {
        if (currentTool === 'eraser') eraseAt(coords.x, coords.y);
        else if (currentTool === 'text') {
            const existingText = [...objects].reverse().find(obj => {
                if (obj.type === 'text') {
                    return hitTest(obj, coords.x, coords.y, 2);
                }
                return false;
            });
            
            if (existingText) {
                startTextEdit(existingText);
                requestDraw();
                return;
            }
            createNewText(coords);
        }
        else if (currentTool === 'grid') {
            startDrawing(coords);
            return;
        }
        else startDrawing(coords);
        return;
    }
    
    if (currentTool === 'select') {
        let clickedObj = null;
        let clickedHandle = null;
        
        if (selectedObjects.length > 0) {
            clickedHandle = hitHandle(coords.x, coords.y);
        }
        
        if (!clickedHandle) {
            clickedObj = [...objects].reverse().find(obj => hitTest(obj, coords.x, coords.y, 2));
        }
        
        if (clickedHandle) {
            if (clickedHandle === 'rotate') startRotate(e);
            else startResizeGroup(clickedHandle, e);
            return;
        }
        
        if (clickedObj) {
            if (!selectedObjects.includes(clickedObj)) {
                if (!shiftKey) selectedObjects = [];
                selectedObjects.push(clickedObj);
            } else if (shiftKey) {
                selectedObjects = selectedObjects.filter(o => o !== clickedObj);
            }
            
            isDragging = true;
            dragStartX = coords.x;
            dragStartY = coords.y;
            
            startResizeState = selectedObjects.map(o => ({
                obj: o,
                x: o.x, y: o.y,
                ex: o.ex, ey: o.ey,
                points: o.points ? JSON.parse(JSON.stringify(o.points)) : null,
                w: o.w, h: o.h
            }));
            
            requestDraw();
        } else {
            selectedObjects = [];
            isSelectingArea = true;
            selectionStart = { x: coords.x, y: coords.y };
            selectionEnd = { x: coords.x, y: coords.y };
            requestDraw();
        }
    } else if (currentTool === 'hand') {
        isDragging = true;
        dragStartX = coords.rawX;
        dragStartY = coords.rawY;
    }
});

canvas.addEventListener('mousemove', (e) => {
    const coords = getCoords(e);
    
    if (currentTool === 'select' && selectedObjects.length > 0 && !isDragging && !isResizing && !isRotating && !isSelectingArea) {
        const handle = hitHandle(coords.x, coords.y);
        canvas.style.cursor = getCursor(handle);
    } else if (currentTool === 'select') canvas.style.cursor = isSelectingArea ? 'crosshair' : 'default';
    else if (currentTool === 'hand') canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
    else if (currentTool === 'eraser') {
        canvas.style.cursor = 'cell';
        if (e.buttons === 1) eraseAt(coords.x, coords.y);
    } else if (currentTool === 'pen') {
        canvas.style.cursor = 'pencil';
    } else if (currentTool === 'line' || currentTool === 'arrow' || currentTool === 'shape' || currentTool === 'rect') {
        canvas.style.cursor = 'crosshair';
    } else if (currentTool === 'grid') {
        canvas.style.cursor = 'crosshair';
    } else canvas.style.cursor = 'crosshair';
    
    if (!isDragging && !isResizing && !isRotating && !isDrawing && !isSelectingArea) return;
    
    if (isDragging && selectedObjects.length > 0) {
        const dx = coords.x - dragStartX;
        const dy = coords.y - dragStartY;
        
        startResizeState.forEach(state => {
            const o = state.obj;
            if (o.type === 'line' || o.type === 'arrow' || o.type === 'rect' || o.type === 'grid' || o.type === 'shape') {
                o.x = state.x + dx;
                o.y = state.y + dy;
                o.ex = state.ex + dx;
                o.ey = state.ey + dy;
                if (o.w !== undefined) o.w = state.w;
                if (o.h !== undefined) o.h = state.h;
            } else if (o.type === 'pen') {
                o.x = state.x + dx;
                o.y = state.y + dy;
                o.points = state.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
            } else {
                o.x = state.x + dx;
                o.y = state.y + dy;
            }
        });
        requestDraw();
    } 
    else if (isSelectingArea) {
        selectionEnd = { x: coords.x, y: coords.y };
        requestDraw();
    }
    else if (isDragging && currentTool === 'hand') {
        offsetX += coords.rawX - dragStartX;
        offsetY += coords.rawY - dragStartY;
        dragStartX = coords.rawX;
        dragStartY = coords.rawY;
        requestDraw();
    } 
    else if (isDrawing && currentPath) {
        if (currentPath.type === 'pen') {
            const lastPoint = currentPath.points.length > 0 
                ? currentPath.points[currentPath.points.length - 1] 
                : { x: currentPath.x, y: currentPath.y };
            
            const dist = Math.hypot(coords.x - lastPoint.x, coords.y - lastPoint.y);
            if (dist > 2 / scale) {
                const smoothedX = lastPoint.x + (coords.x - lastPoint.x) * SMOOTHING_FACTOR;
                const smoothedY = lastPoint.y + (coords.y - lastPoint.y) * SMOOTHING_FACTOR;
                currentPath.points.push({ x: smoothedX, y: smoothedY });
            }
        }
        else if (currentPath.type === 'shape' || currentPath.type === 'rect') {
            currentPath.w = coords.x - currentPath.x;
            currentPath.h = coords.y - currentPath.y;
        }
        else if (currentPath.type === 'line' || currentPath.type === 'arrow') {
            currentPath.ex = coords.x;
            currentPath.ey = coords.y;
        }
        else if (currentPath.type === 'grid') {
            currentPath.w = coords.x - currentPath.x;
            currentPath.h = coords.y - currentPath.y;
        }
        requestDraw();
    } 
    else if (isRotating && selectedObjects.length > 0) {
        const bbox = getGroupBBox(selectedObjects);
        const centerX = bbox.x + bbox.w / 2;
        const centerY = bbox.y + bbox.h / 2;
        
        const angle = Math.atan2(coords.y - centerY, coords.x - centerX);
        const degrees = angle * 180 / Math.PI + 90;
        
        selectedObjects.forEach(obj => {
            if (!obj.rotation) obj.rotation = 0;
            const originalRotation = startResizeState.originalRotation || 0;
            obj.rotation = originalRotation + (degrees - startResizeState.startAngle);
        });
        requestDraw();
    }
});

canvas.addEventListener('mouseup', () => {
    if (isSelectingArea) {
        isSelectingArea = false;
        
        const minX = Math.min(selectionStart.x, selectionEnd.x);
        const maxX = Math.max(selectionStart.x, selectionEnd.x);
        const minY = Math.min(selectionStart.y, selectionEnd.y);
        const maxY = Math.max(selectionStart.y, selectionEnd.y);
        
        const newSelection = objects.filter(obj => {
            const bbox = getBBox(obj);
            if (!bbox) return false;
            return !(bbox.x > maxX || bbox.x + bbox.w < minX || bbox.y > maxY || bbox.y + bbox.h < minY);
        });
        
        if (newSelection.length > 0) {
            if (!shiftKey) selectedObjects = [];
            newSelection.forEach(obj => {
                if (!selectedObjects.includes(obj)) selectedObjects.push(obj);
            });
        }
        requestDraw();
        return;
    }
    
    if (isDrawing && currentPath) {
        if (currentPath.type === 'pen' && currentPath.points.length > 1) {
            saveHistory();
            objects.push(currentPath);
            if (socket && socket.connected) socket.emit('new-object', currentPath);
        } else if (currentPath.type === 'shape') {
            if (Math.abs(currentPath.w) > 10 && Math.abs(currentPath.h) > 10) {
                saveHistory();
                currentPath.type = 'shape';
                currentPath.shapeType = selectedShapeType;
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'rect') {
            if (Math.abs(currentPath.w) > 2 && Math.abs(currentPath.h) > 2) {
                saveHistory();
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'line' || currentPath.type === 'arrow') {
            if (Math.abs(currentPath.ex - currentPath.x) > 2 || Math.abs(currentPath.ey - currentPath.y) > 2) {
                saveHistory();
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'grid') {
            if (Math.abs(currentPath.w) > 50 && Math.abs(currentPath.h) > 50) {
                saveHistory();
                currentPath.type = 'grid';
                currentPath.gridSpacing = 40;
                currentPath.axisColor = '#000000';
                currentPath.gridColor = '#cccccc';
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        }
        isDrawing = false;
        currentPath = null;
        requestDraw();
    }
    
    if (isDragging || isResizing || isRotating) {
        if (isRotating || isResizing || (isDragging && selectedObjects.length > 0)) {
            saveHistory();
        }
        isDragging = false; isResizing = false; isRotating = false;
        if (socket && socket.connected) socket.emit('update-all', objects);
    }
});

// ============================================
// ЛАСТИК
// ============================================

function eraseAt(mx, my) {
    const eraserRadius = 30 / scale;
    let changed = false;
    
    for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        let shouldRemove = false;
        
        if (obj.type === 'pen') {
            const allPoints = [{x: obj.x, y: obj.y}, ...obj.points];
            for (let p of allPoints) {
                if (Math.hypot(p.x - mx, p.y - my) < eraserRadius) {
                    shouldRemove = true;
                    break;
                }
            }
        } else if (obj.type === 'line' || obj.type === 'arrow') {
            if (distToSegment(mx, my, obj.x, obj.y, obj.ex, obj.ey) < eraserRadius) shouldRemove = true;
        } else if (obj.type === 'rect' || obj.type === 'shape') {
            const bbox = getBBox(obj);
            if (bbox && mx >= bbox.x && mx <= bbox.x + bbox.w && my >= bbox.y && my <= bbox.y + bbox.h) {
                shouldRemove = true;
            }
        } else if (obj.type === 'text' || obj.type === 'image' || obj.type === 'grid') {
            const bbox = getBBox(obj);
            if (bbox && mx >= bbox.x && mx <= bbox.x + bbox.w && my >= bbox.y && my <= bbox.y + bbox.h) {
                shouldRemove = true;
            }
        }
        
        if (shouldRemove) {
            saveHistory();
            objects.splice(i, 1);
            selectedObjects = selectedObjects.filter(o => o !== obj);
            changed = true;
        }
    }
    if (changed) { 
        if (socket && socket.connected) socket.emit('update-all', objects); 
        requestDraw(); 
    }
}

// ============================================
// ПОЧАТОК МАЛЮВАННЯ
// ============================================

function startDrawing(coords) {
    isDrawing = true;
    currentPath = {
        type: currentTool,
        color: currentPenColor,
        width: document.getElementById('lineWidth').value,
        x: coords.x, y: coords.y, ex: coords.x, ey: coords.y,
        w: 0, h: 0
    };
    
    if (selectedLineToolType === 'dotted') {
        currentPath.lineStyle = 'dotted';
    }
    
    if (currentTool === 'pen') currentPath.points = [];
    if (currentTool === 'shape') {
        currentPath.shapeType = selectedShapeType;
    }
    if (currentTool === 'line' && selectedLineToolType === 'compass') {
        currentPath.type = 'compass';
        currentPath.radius = 0;
    }
}

// ============================================
// ЗМІНА РОЗМІРУ ГРУПИ
// ============================================

function startResizeGroup(handle, e) {
    isResizing = true;
    resizeHandle = handle;
    const coords = getCoords(e);
    dragStartX = coords.x; dragStartY = coords.y;
    
    const groupBBox = getGroupBBox(selectedObjects);
    
    startResizeState = {
        objects: selectedObjects.map(o => ({
            obj: o,
            x: o.x, y: o.y, 
            ex: o.ex, ey: o.ey, 
            w: o.w, h: o.h, 
            points: o.points ? JSON.parse(JSON.stringify(o.points)) : null,
            rotation: o.rotation || 0
        })),
        groupBBox: groupBBox,
        originalRotation: selectedObjects[0]?.rotation || 0,
        startAngle: 0
    };
    
    if (handle === 'rotate') {
        isRotating = true;
        const centerX = groupBBox.x + groupBBox.w / 2;
        const centerY = groupBBox.y + groupBBox.h / 2;
        startResizeState.startAngle = Math.atan2(coords.y - centerY, coords.x - centerX) * 180 / Math.PI;
    }

    const onMove = (e) => {
        if (!isResizing && !isRotating) return;
        const c = getCoords(e);
        
        if (isRotating) {
            const centerX = startResizeState.groupBBox.x + startResizeState.groupBBox.w / 2;
            const centerY = startResizeState.groupBBox.y + startResizeState.groupBBox.h / 2;
            const currentAngle = Math.atan2(c.y - centerY, c.x - centerX) * 180 / Math.PI;
            const deltaAngle = currentAngle - startResizeState.startAngle;
            
            selectedObjects.forEach(obj => {
                obj.rotation = (startResizeState.originalRotation + deltaAngle) % 360;
            });
        } else {
            const oldBBox = startResizeState.groupBBox;
            let newW = oldBBox.w;
            let newH = oldBBox.h;
            let newX = oldBBox.x;
            let newY = oldBBox.y;
            
            if (handle.includes('e')) newW = c.x - oldBBox.x;
            if (handle.includes('w')) { newW = oldBBox.w + (oldBBox.x - c.x); newX = c.x; }
            if (handle.includes('s')) newH = c.y - oldBBox.y;
            if (handle.includes('n')) { newH = oldBBox.h + (oldBBox.y - c.y); newY = c.y; }
            
            if (newW < 10) newW = 10;
            if (newH < 10) newH = 10;
            if (handle.includes('e') && newW < 10) newW = 10;
            if (handle.includes('w') && newW < 10) { newX = oldBBox.x + oldBBox.w - 10; newW = 10; }
            if (handle.includes('s') && newH < 10) newH = 10;
            if (handle.includes('n') && newH < 10) { newY = oldBBox.y + oldBBox.h - 10; newH = 10; }

            const scaleX = newW / oldBBox.w;
            const scaleY = newH / oldBBox.h;

            startResizeState.objects.forEach(state => {
                const o = state.obj;
                
                if (o.type === 'line' || o.type === 'arrow' || o.type === 'rect' || o.type === 'grid' || o.type === 'shape') {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    o.ex = newX + (state.ex - oldBBox.x) * scaleX;
                    o.ey = newY + (state.ey - oldBBox.y) * scaleY;
                    if (o.type === 'grid' || o.type === 'shape') {
                        o.w = state.w * scaleX;
                        o.h = state.h * scaleY;
                    }
                } else if (o.type === 'pen') {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    o.points = state.points.map(p => ({
                        x: newX + (p.x - oldBBox.x) * scaleX,
                        y: newY + (p.y - oldBBox.y) * scaleY
                    }));
                } else {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    
                    if (o.type === 'image') {
                        o.w = state.w * scaleX;
                        o.h = state.h * scaleY;
                    } else if (o.type === 'text') {
                        const avgScale = (scaleX + scaleY) / 2;
                        o.size = Math.max(8, state.obj.size * avgScale);
                    }
                }
            });
        }
        requestDraw();
    };
    
    const onUp = () => { 
        isResizing = false; 
        isRotating = false;
        document.removeEventListener('mousemove', onMove); 
        document.removeEventListener('mouseup', onUp); 
        saveHistory(); 
        if (socket && socket.connected) socket.emit('update-all', objects); 
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

function startRotate(e) {}

// ============================================
// СТВОРЕННЯ НОВОГО ТЕКСТУ
// ============================================

function createNewText(coords) {
    const obj = {
        type: 'text', x: coords.x, y: coords.y, 
        text: '', 
        color: currentPenColor,
        size: 20, isBold: document.getElementById('boldText').checked,
        rotation: 0
    };
    saveHistory();
    objects.push(obj); selectedObjects = [obj];
    if (socket && socket.connected) socket.emit('new-object', obj);
    requestDraw();
    startTextEdit(obj);
}

// ============================================
// ВИБІР ІНСТРУМЕНТУ
// ============================================

function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
    if (tool !== 'select' && selectedObjects.length > 0) { selectedObjects = []; requestDraw(); }
    
    if (tool === 'select') canvas.className = 'cursor-default';
    else if (tool === 'hand') canvas.className = 'cursor-grab';
    else if (tool === 'eraser') canvas.className = 'cursor-eraser';
    else if (tool === 'pen') canvas.className = 'cursor-pencil';
    else if (tool === 'line' || tool === 'arrow' || tool === 'shape' || tool === 'rect') canvas.className = 'cursor-crosshair';
    else if (tool === 'grid') canvas.className = 'cursor-grid';
    else if (tool === 'text') canvas.className = 'cursor-text';
    else canvas.className = 'cursor-crosshair';
}

document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => btn.onclick = () => setTool(btn.dataset.tool));

// ============================================
// КНОПКИ ПАНЕЛІ
// ============================================

document.getElementById('clearBtn').onclick = () => { 
    if(confirm("Очистити дошку?")) {
        saveHistory();
        objects = []; selectedObjects = [];
        if (textEditor) stopTextEdit();
        if (socket && socket.connected) socket.emit('delete-board');
        requestDraw();
    }
};

function createNewBoard() { 
    const newId = Math.random().toString(36).substr(2, 9);
    window.location.href = '/' + newId; 
}

const colorPickerBtn = document.getElementById('colorPickerBtn');
const colorPickerInput = document.getElementById('colorPickerInput');

colorPickerBtn.addEventListener('click', () => {
    colorPickerInput.click();
});

colorPickerInput.addEventListener('input', (e) => {
    selectPenColor(e.target.value);
});

// ============================================
// МАСШТАБУВАННЯ
// ============================================

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const oldScale = scale;
    scale *= delta;
    scale = Math.min(Math.max(scale, 0.2), 5.0);
    
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const mx = (mouseX - offsetX) / oldScale;
    const my = (mouseY - offsetY) / oldScale;
    
    offsetX = mouseX - mx * scale;
    offsetY = mouseY - my * scale;
    
    updateZoomDisplay();
    
    if (textEditor && editingObject) {
        const bbox = getBBox(editingObject);
        textEditor.style.left = (bbox.x * scale + offsetX - 10) + 'px';
        textEditor.style.top = (bbox.y * scale + offsetY - 5) + 'px';
    }
    
    requestDraw();
}, { passive: false });

// ============================================
// ВСТАВКА ЗОБРАЖЕНЬ
// ============================================

window.addEventListener('paste', (e) => {
    if (textEditor) return;
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.indexOf('image') !== -1) {
            const blob = item.getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const centerX = (canvas.width/2 - offsetX) / scale;
                    const centerY = (canvas.height/2 - offsetY) / scale;
                    const obj = { 
                        type: 'image', 
                        src: event.target.result, 
                        x: centerX - img.width/4, 
                        y: centerY - img.height/4, 
                        w: img.width/2, 
                        h: img.height/2, 
                        rotation: 0 
                    };
                    saveHistory();
                    objects.push(obj); 
                    selectedObjects = [obj];
                    if (socket && socket.connected) socket.emit('new-object', obj); 
                    requestDraw();
                };
            };
            reader.readAsDataURL(blob);
        }
    }
});

// ============================================
// SOCKET.IO ПОДІЇ
// ============================================

socket.on('init-history', (h) => { 
    objects = h;
    historyStack = [{ objects: JSON.parse(JSON.stringify(objects)), view: { scale, offsetX, offsetY } }];
    historyIndex = 0;
    let imagesLoaded = 0;
    const totalImages = objects.filter(o => o.type === 'image').length;
    
    if (totalImages === 0) {
        requestDraw();
    } else {
        objects.forEach(obj => {
            if (obj.type === 'image') {
                obj._img = new Image();
                obj._img.src = obj.src;
                obj._img.onload = () => {
                    imagesLoaded++;
                    if (imagesLoaded >= totalImages) requestDraw();
                };
                obj._img.onerror = () => {
                    imagesLoaded++;
                    if (imagesLoaded >= totalImages) requestDraw();
                };
            }
        });
    }
});

socket.on('new-object', (o) => { 
    objects.push(o); 
    saveHistory();
    requestDraw(); 
});

socket.on('update-all', (newObjects) => { 
    objects = newObjects; 
    if (!isUndoing) {
        saveHistory();
    }
    requestDraw(); 
});

socket.on('board-deleted', () => { 
    objects = []; 
    selectedObjects = []; 
    historyStack = [];
    historyIndex = -1;
    requestDraw(); 
});

</script>
