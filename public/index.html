<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Whiteboard Pro: Eraser & Area Select</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; transition: 0.2s; font-size: 13px; }
        button:hover { background: #bdc3c7; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; overflow: hidden; }
        canvas { display: block; background: white; }
        
        /* Курсори */
        .cursor-pen { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='32' height='32' style='font-size:24px'><text y='24' x='0'>✏️</text></svg>") 2 24, crosshair; }
        .cursor-eraser { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='32' height='32' style='font-size:24px'><text y='24' x='0'>🧽</text></svg>") 12 12, cell; }
        
        .status-bar { position: absolute; bottom: 15px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 6px 18px; border-radius: 20px; font-size: 12px; pointer-events: none; z-index: 20; }
        .size-control { display: flex; align-items: center; gap: 5px; background: #34495e; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('select')" id="selectBtn" class="active">🔦 Вибір</button>
    <button onclick="setTool('hand')" id="handBtn">✋ Рука</button>
    <button onclick="setTool('pen')" id="penBtn">✏️ Ручка</button>
    <button onclick="setTool('eraser')" id="eraserBtn">🧽 Ластик</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Квадрат</button>
    <input type="color" id="colorPicker" value="#000000">
    <div class="size-control">
        <input type="range" id="sizePicker" min="1" max="50" value="3">
    </div>
    <div style="flex-grow: 1;"></div>
    <button onclick="undo()" style="background:#f39c12; color:white;">↩️ Відміна</button>
    <button onclick="clearBoard()" style="background:#e74c3c; color:white;">Очистити</button>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div class="status-bar" id="infoBar">Ctrl+V для вставки | Рамка для масового виділення | Del для видалення</div>
</div>

<script>
    const boardId = window.location.pathname.split('/').pop() || 'main';
    const socket = io({ query: { boardId } });
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    
    let tool = 'select', isDrawing = false, objects = [], currentObj = null;
    let scale = 1, offsetX = 0, offsetY = 0;
    let selectedObjects = [], isDragging = false, isResizing = false, isRotating = false, lastPos = {x:0, y:0};

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.querySelector('.toolbar').offsetHeight;
        render();
    }
    window.onresize = resize; resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        document.getElementById(t + 'Btn').classList.add('active');
        canvas.className = t === 'pen' ? 'cursor-pen' : (t === 'eraser' ? 'cursor-eraser' : '');
        if(t !== 'select') selectedObjects = [];
        render();
    }

    function getCoords(e) {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left - offsetX) / scale, y: (e.clientY - r.top - offsetY) / scale };
    }

    function isPointInObj(p, obj) {
        const m = 10;
        const cx = obj.x + (obj.w/2 || 0), cy = obj.y + (obj.h/2 || 0);
        const s = Math.sin(-(obj.angle || 0)), c = Math.cos(-(obj.angle || 0));
        const rx = c * (p.x - cx) - s * (p.y - cy), ry = s * (p.x - cx) + c * (p.y - cy);

        if (obj.type === 'rect' || obj.type === 'image') {
            return Math.abs(rx) <= (obj.w/2) && Math.abs(ry) <= (obj.h/2);
        }
        if (obj.type === 'pen' || obj.type === 'eraser') {
            return obj.points.some(pt => Math.hypot(pt.x - p.x, pt.y - p.y) < (obj.lineWidth || 5));
        }
        return false;
    }

    canvas.onmousedown = (e) => {
        const p = getCoords(e); lastPos = p; isDrawing = true;

        if (tool === 'select') {
            // Перевірка на ручки трансформації (якщо виділено один об'єкт)
            if (selectedObjects.length === 1) {
                const o = selectedObjects[0];
                const cx = o.x + o.w/2, cy = o.y + o.h/2;
                const rotX = cx + (0) * Math.cos(o.angle||0) - (-o.h/2 - 30) * Math.sin(o.angle||0);
                const rotY = cy + (0) * Math.sin(o.angle||0) + (-o.h/2 - 30) * Math.cos(o.angle||0);
                if (Math.hypot(p.x - rotX, p.y - rotY) < 15) { isRotating = true; return; }
                
                const resX = cx + (o.w/2) * Math.cos(o.angle||0) - (o.h/2) * Math.sin(o.angle||0);
                const resY = cy + (o.w/2) * Math.sin(o.angle||0) + (o.h/2) * Math.cos(o.angle||0);
                if (Math.hypot(p.x - resX, p.y - resY) < 15) { isResizing = true; return; }
            }
            
            const clicked = objects.slice().reverse().find(o => isPointInObj(p, o));
            if (clicked) {
                if (!selectedObjects.includes(clicked)) selectedObjects = [clicked];
                isDragging = true;
            } else {
                selectedObjects = [];
                currentObj = { type: 'select_area', x: p.x, y: p.y, w: 0, h: 0 };
            }
            render(); return;
        }

        const common = { color: document.getElementById('colorPicker').value, lineWidth: parseInt(document.getElementById('sizePicker').value), x: p.x, y: p.y, angle: 0 };
        if (tool === 'pen' || tool === 'eraser') currentObj = { type: tool, ...common, points: [{x:p.x, y:p.y}] };
        else if (tool === 'rect') currentObj = { type: 'rect', ...common, w: 0, h: 0 };
    };

    window.onmousemove = (e) => {
        if (!isDrawing) return;
        const p = getCoords(e); const dx = p.x - lastPos.x, dy = p.y - lastPos.y;

        if (isRotating && selectedObjects[0]) {
            const o = selectedObjects[0];
            o.angle = Math.atan2(p.y - (o.y + o.h/2), p.x - (o.x + o.w/2)) + Math.PI/2;
        } else if (isResizing && selectedObjects[0]) {
            const o = selectedObjects[0];
            o.w += dx; o.h += dy;
        } else if (isDragging) {
            selectedObjects.forEach(o => { 
                o.x += dx; o.y += dy; 
                if(o.points) o.points.forEach(pt => { pt.x += dx; pt.y += dy; });
            });
        } else if (tool === 'hand') { offsetX += e.movementX; offsetY += e.movementY; }
        else if (currentObj) {
            if (currentObj.type === 'pen' || currentObj.type === 'eraser') currentObj.points.push({x:p.x, y:p.y});
            else { currentObj.w = p.x - currentObj.x; currentObj.h = p.y - currentObj.y; }
        }
        lastPos = p; render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) {
            if (currentObj.type === 'select_area') {
                const x1 = Math.min(currentObj.x, currentObj.x + currentObj.w), x2 = Math.max(currentObj.x, currentObj.x + currentObj.w);
                const y1 = Math.min(currentObj.y, currentObj.y + currentObj.h), y2 = Math.max(currentObj.y, currentObj.y + currentObj.h);
                selectedObjects = objects.filter(o => (o.x >= x1 && o.x <= x2 && o.y >= y1 && o.y <= y2));
            } else { objects.push(currentObj); socket.emit('new-object', currentObj); }
        }
        if (isDragging || isResizing || isRotating) socket.emit('full-update', objects);
        isDrawing = isDragging = isResizing = isRotating = false; currentObj = null; render();
    };

    window.addEventListener('paste', (e) => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const obj = { type: 'image', src: event.target.result, x: (canvas.width/2-offsetX)/scale - img.width/4, y: (canvas.height/2-offsetY)/scale - img.height/4, w: img.width/2, h: img.height/2, angle: 0 };
                    objects.push(obj); socket.emit('new-object', obj); render();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(item.getAsFile());
        }
    });

    function draw(obj) {
        ctx.save();
        const cx = obj.x + (obj.w/2 || 0), cy = obj.y + (obj.h/2 || 0);
        ctx.translate(cx, cy); ctx.rotate(obj.angle || 0); ctx.translate(-cx, -cy);
        
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; ctx.lineWidth = obj.lineWidth;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        if (obj.type === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.lineWidth = obj.lineWidth * 2;
        }

        if (obj.type === 'pen' || obj.type === 'eraser') {
            ctx.beginPath(); obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.stroke();
        } else if (obj.type === 'rect') ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        else if (obj.type === 'image') {
            const i = new Image(); i.src = obj.src; 
            if(i.complete) ctx.drawImage(i, obj.x, obj.y, obj.w, obj.h); else i.onload = render;
        }

        if (selectedObjects.includes(obj) && tool === 'select') {
            ctx.setLineDash(); ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2/scale;
            ctx.strokeRect(obj.x - 5, obj.y - 5, (obj.w || 0) + 10, (obj.h || 0) + 10);
            if (selectedObjects.length === 1) {
                ctx.setLineDash([]); ctx.fillStyle = '#3498db';
                ctx.fillRect(obj.x + obj.w, obj.y + obj.h, 10/scale, 10/scale);
                ctx.beginPath(); ctx.arc(obj.x + obj.w/2, obj.y - 30, 7/scale, 0, Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const g = 30 * scale; ctx.beginPath(); ctx.strokeStyle = '#eee';
        for (let x=offsetX%g; x<canvas.width; x+=g) { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
        for (let y=offsetY%g; y<canvas.height; y+=g) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
        ctx.stroke();
        ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
        objects.forEach(draw); 
        if(currentObj) { 
            if(currentObj.type === 'select_area') { 
                ctx.strokeStyle='#3498db'; ctx.setLineDash([5,5]); 
                ctx.strokeRect(currentObj.x, currentObj.y, currentObj.w, currentObj.h); 
            } else draw(currentObj); 
        }
        ctx.restore();
    }

    window.onkeydown = (e) => {
        if (e.code === 'Delete') { objects = objects.filter(o => !selectedObjects.includes(o)); selectedObjects = []; socket.emit('full-update', objects); render(); }
        if (e.ctrlKey && e.code === 'KeyZ') undo();
    };

    window.onwheel = (e) => {
        e.preventDefault(); const old = scale; scale = Math.min(Math.max(0.1, scale + (e.deltaY>0?-0.1:0.1)), 4);
        offsetX -= (e.clientX - offsetX) * (scale / old - 1); offsetY -= (e.clientY - 50 - offsetY) * (scale / old - 1); render();
    }, { passive: false };

    socket.on('init-history', h => { objects = h; render(); });
    socket.on('new-object', o => { objects.push(o); render(); });
    socket.on('full-update', h => { objects = h; render(); });
    socket.on('undo', () => { objects.pop(); render(); });
    function undo() { objects.pop(); socket.emit('undo'); render(); }
    function clearBoard() { if(confirm("Очистити?")) { objects = []; socket.emit('clear-board'); render(); } }
</script>
</body>
</html>
