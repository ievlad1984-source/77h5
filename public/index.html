// ============================================
// МАЛЮВАННЯ СІТКИ
// ============================================

function drawGrid() {
    const smallStep = 20 * scale;
    const largeStep = 100 * scale;
    
    ctx.beginPath();
    ctx.strokeStyle = '#e8e8e8';
    ctx.lineWidth = 0.5;
    
    let startX = offsetX % smallStep;
    let startY = offsetY % smallStep;
    
    for (let x = startX; x < canvas.width; x += smallStep) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    for (let y = startY; y < canvas.height; y += smallStep) {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
    
    ctx.beginPath();
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 0.5;
    
    startX = offsetX % largeStep;
    startY = offsetY % largeStep;
    
    for (let x = startX; x < canvas.width; x += largeStep) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    for (let y = startY; y < canvas.height; y += largeStep) {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
}

// ============================================
// МАЛЮВАННЯ ВИДІЛЕННЯ
// ============================================

function drawSelection() {
    if (selectedObjects.length === 0) return;
    
    const bbox = getGroupBBox(selectedObjects);
    if (!bbox) return;
    
    const sx = bbox.x * scale + offsetX;
    const sy = bbox.y * scale + offsetY;
    const sw = bbox.w * scale;
    const sh = bbox.h * scale;
    
    if (sw < 5 || sh < 5) return;
    
    ctx.save();
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.restore();
    
    const handleSize = 8;
    const handles = [
        { x: sx, y: sy }, { x: sx + sw/2, y: sy }, { x: sx + sw, y: sy },
        { x: sx + sw, y: sy + sh/2 }, { x: sx + sw, y: sy + sh },
        { x: sx + sw/2, y: sy + sh }, { x: sx, y: sy + sh }, { x: sx, y: sy + sh/2 }
    ];
    
    ctx.fillStyle = '#4CAF50';
    handles.forEach(h => {
        ctx.fillRect(h.x - handleSize/2, h.y - handleSize/2, handleSize, handleSize);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.strokeRect(h.x - handleSize/2, h.y - handleSize/2, handleSize, handleSize);
    });
    
    ctx.fillStyle = '#2196F3';
    ctx.beginPath();
    ctx.arc(sx + sw/2, sy - 15, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(sx + sw/2, sy);
    ctx.lineTo(sx + sw/2, sy - 10);
    ctx.strokeStyle = '#2196F3';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
}

function drawMarqueeSelection() {
    if (!isSelectingArea) return;
    
    const x1 = selectionStart.x * scale + offsetX;
    const y1 = selectionStart.y * scale + offsetY;
    const x2 = selectionEnd.x * scale + offsetX;
    const y2 = selectionEnd.y * scale + offsetY;
    
    ctx.save();
    ctx.fillStyle = 'rgba(0, 123, 255, 0.15)';
    ctx.strokeStyle = '#007bff';
    ctx.lineWidth = 1;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    ctx.restore();
}

// ============================================
// ГОЛОВНА ФУНКЦІЯ МАЛЮВАННЯ
// ============================================

function draw() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawGrid();
    
    objects.forEach(obj => drawObject(obj));
    
    if (isDrawing && currentPath) drawObject(currentPath, true);
    
    if (selectedObjects.length > 0 && currentTool === 'select' && !textEditor) {
        drawSelection();
    }
    
    drawMarqueeSelection();
}

// ============================================
// МАЛЮВАННЯ КООРДИНАТНОЇ СІТКИ
// ============================================

function drawCoordinateGrid(obj) {
    const sx = obj.x * scale + offsetX;
    const sy = obj.y * scale + offsetY;
    const sw = obj.w * scale;
    const sh = obj.h * scale;
    
    const gridSpacing = obj.gridSpacing || 40;
    const axisColor = obj.axisColor || '#000000';
    const gridColor = obj.gridColor || '#cccccc';
    
    ctx.save();
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx, sy, sw, sh);
    
    ctx.strokeStyle = '#dddddd';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, sw, sh);
    
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    
    for (let x = 0; x <= sw; x += gridSpacing) {
        ctx.beginPath();
        ctx.moveTo(sx + x, sy);
        ctx.lineTo(sx + x, sy + sh);
        ctx.stroke();
    }
    
    for (let y = 0; y <= sh; y += gridSpacing) {
        ctx.beginPath();
        ctx.moveTo(sx, sy + y);
        ctx.lineTo(sx + sw, sy + y);
        ctx.stroke();
    }
    
    const totalCellsX = Math.round(sw / gridSpacing);
    const totalCellsY = Math.round(sh / gridSpacing);
    
    const cellsRight = Math.floor(totalCellsX / 2);
    const cellsLeft = totalCellsX - cellsRight;
    const cellsUp = Math.floor(totalCellsY / 2);
    const cellsDown = totalCellsY - cellsUp;
    
    const originX = sx + cellsRight * gridSpacing;
    const originY = sy + cellsUp * gridSpacing;
    
    ctx.strokeStyle = axisColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, originY);
    ctx.lineTo(sx + sw, originY);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(originX, sy + sh);
    ctx.lineTo(originX, sy);
    ctx.stroke();
    
    const arrowSize = 8;
    ctx.beginPath();
    ctx.moveTo(sx + sw, originY);
    ctx.lineTo(sx + sw - arrowSize, originY - arrowSize);
    ctx.moveTo(sx + sw, originY);
    ctx.lineTo(sx + sw - arrowSize, originY + arrowSize);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(originX, sy);
    ctx.lineTo(originX - arrowSize, sy + arrowSize);
    ctx.moveTo(originX, sy);
    ctx.lineTo(originX + arrowSize, sy + arrowSize);
    ctx.stroke();
    
    ctx.fillStyle = axisColor;
    ctx.font = 'bold 16px Segoe UI';
    ctx.fillText('X', sx + sw - 15, originY - 15);
    ctx.fillText('Y', originX + 12, sy + 18);
    
    ctx.font = '12px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    
    for (let i = 1; i <= cellsRight; i++) {
        const x = originX + i * gridSpacing;
        if (x >= sx + 10 && x <= sx + sw - 10) {
            ctx.fillText(i.toString(), x, originY + 6);
        }
    }
    
    for (let i = 1; i <= cellsLeft; i++) {
        const x = originX - i * gridSpacing;
        if (x >= sx + 10 && x <= sx + sw - 10) {
            ctx.fillText((-i).toString(), x, originY + 6);
        }
    }
    
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i = 1; i <= cellsUp; i++) {
        const y = originY - i * gridSpacing;
        if (y >= sy + 10 && y <= sy + sh - 10) {
            ctx.fillText(i.toString(), originX - 6, y);
        }
    }
    
    for (let i = 1; i <= cellsDown; i++) {
        const y = originY + i * gridSpacing;
        if (y >= sy + 10 && y <= sy + sh - 10) {
            ctx.fillText((-i).toString(), originX - 6, y);
        }
    }
    
    ctx.font = 'bold 12px Segoe UI';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('0', originX - 6, originY + 6);
    
    ctx.restore();
}

// ============================================
// МАЛЮВАННЯ ОБ'ЄКТА
// ============================================

function drawObject(obj, isTemp = false) {
    ctx.save();
    const sx = obj.x * scale + offsetX;
    const sy = obj.y * scale + offsetY;
    
    ctx.lineWidth = (obj.width || 2) * scale;
    ctx.strokeStyle = obj.color || '#000';
    ctx.fillStyle = obj.color || '#000';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    if (obj.lineStyle === 'dotted') {
        ctx.setLineDash([5 * scale, 5 * scale]);
    } else {
        ctx.setLineDash([]);
    }
    
    if (obj.rotation) {
        ctx.translate(sx, sy);
        ctx.rotate(obj.rotation * Math.PI / 180);
        ctx.translate(-sx, -sy);
    }
    
    if (obj.type === 'pen') {
        if (!obj.points || obj.points.length === 0) { ctx.restore(); return; }
        drawSmoothPath(ctx, [{x: obj.x, y: obj.y}, ...obj.points]);
    } else if (obj.type === 'line' || obj.type === 'arrow') {
        const ex = obj.ex * scale + offsetX;
        const ey = obj.ey * scale + offsetY;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        if (obj.type === 'arrow') {
            const headlen = 15 * scale;
            const angle = Math.atan2(ey - sy, ex - sx);
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - headlen * Math.cos(angle - Math.PI / 6), ey - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - headlen * Math.cos(angle + Math.PI / 6), ey - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }
    } else if (obj.type === 'rect') {
        const w = obj.w * scale;
        const h = obj.h * scale;
        if (obj.fillColor) {
            ctx.fillStyle = obj.fillColor;
            ctx.fillRect(sx, sy, w, h);
        }
        ctx.strokeRect(sx, sy, w, h);
    } else if (obj.type === 'shape') {
        const w = obj.w * scale;
        const h = obj.h * scale;
        const cx = sx + w / 2;
        const cy = sy + h / 2;
        const minDim = Math.min(Math.abs(w), Math.abs(h));
        
        ctx.beginPath();
        
        if (obj.shapeType === 'circle') {
            ctx.ellipse(cx, cy, minDim/2, minDim/2, 0, 0, Math.PI * 2);
        } else if (obj.shapeType === 'triangle') {
            ctx.moveTo(cx, sy);
            ctx.lineTo(sx + w, sy + h);
            ctx.lineTo(sx, sy + h);
            ctx.closePath();
        } else if (obj.shapeType === 'diamond') {
            ctx.moveTo(cx, sy);
            ctx.lineTo(sx + w, cy);
            ctx.lineTo(cx, sy + h);
            ctx.lineTo(sx, cy);
            ctx.closePath();
        } else if (obj.shapeType === 'pentagon') {
            const r = minDim / 2;
            for (let i = 0; i < 5; i++) {
                const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
                const px = cx + r * Math.cos(angle);
                const py = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        } else if (obj.shapeType === 'hexagon') {
            const r = minDim / 2;
            for (let i = 0; i < 6; i++) {
                const angle = (i * 2 * Math.PI / 6) - Math.PI / 2;
                const px = cx + r * Math.cos(angle);
                const py = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        } else if (obj.shapeType === 'star') {
            const r = minDim / 2;
            const innerR = r * 0.4;
            for (let i = 0; i < 10; i++) {
                const angle = (i * Math.PI / 5) - Math.PI / 2;
                const rad = (i % 2 === 0) ? r : innerR;
                const px = cx + rad * Math.cos(angle);
                const py = cy + rad * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        } else if (obj.shapeType === 'parallelogram') {
            const offset = w * 0.2;
            ctx.moveTo(sx + offset, sy);
            ctx.lineTo(sx + w, sy);
            ctx.lineTo(sx + w - offset, sy + h);
            ctx.lineTo(sx, sy + h);
            ctx.closePath();
        } else if (obj.shapeType === 'rounded-rect') {
            const radius = Math.min(Math.abs(w), Math.abs(h)) * 0.2;
            ctx.roundRect(sx, sy, w, h, radius);
        } else if (obj.shapeType === 'semi-circle') {
            ctx.arc(cx, cy, minDim/2, Math.PI, 0);
            ctx.lineTo(sx + w, cy);
            ctx.lineTo(sx, cy);
            ctx.closePath();
        } else if (obj.shapeType === 'quarter-circle') {
            ctx.arc(sx, sy + h, minDim, -Math.PI/2, 0);
            ctx.lineTo(sx, sy + h);
            ctx.closePath();
        } else if (obj.shapeType === 'heart') {
            ctx.moveTo(cx, sy + h * 0.2);
            ctx.bezierCurveTo(cx, sy, sx, sy, sx, cy);
            ctx.bezierCurveTo(sx, sy + h, cx, sy + h * 1.2, sx + w, sy + h);
            ctx.bezierCurveTo(sx + w, cy, sx + w, sy, cx, sy);
            ctx.closePath();
        } else if (obj.shapeType === 'parabola') {
            const steps = 50;
            const a = 0.01;
            const centerY = sy + h / 2;
            
            ctx.beginPath();
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const px = sx + t * w;
                const py = centerY - a * (t - 0.5) * (t - 0.5) * w * w + a * w * w * 0.25;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
        } else if (obj.shapeType === 'hyperbola') {
            const steps = 50;
            const a = 0.02;
            const b = 0.02;
            
            ctx.beginPath();
            for (let i = 0; i <= steps; i++) {
                const t = (i / steps) * 2 - 1;
                const px = sx + w / 2 + t * w / 2;
                const denom = t * t - 1;
                if (Math.abs(denom) > 0.1) {
                    const py = sy + h / 4 - (b / a) * Math.sqrt(1 + a * a * t * t) * h / 4;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
            }
            
            ctx.moveTo(sx, sy + h * 0.75);
            for (let i = 0; i <= steps; i++) {
                const t = (i / steps) * 2 - 1;
                const px = sx + w / 2 + t * w / 2;
                const denom = t * t - 1;
                if (Math.abs(denom) > 0.1) {
                    const py = sy + h * 0.75 + (b / a) * Math.sqrt(1 + a * a * t * t) * h / 4;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
            }
        }
        
        if (obj.fillColor) {
            ctx.fillStyle = obj.fillColor;
            ctx.fill();
        }
        ctx.stroke();
    } else if (obj.type === 'text') {
        ctx.fillStyle = obj.color || '#000';
        ctx.textBaseline = 'alphabetic';
        const baseSize = obj.size * scale;
        
        if (obj.text && obj.text.trim() !== '') {
            ctx.font = `${obj.isBold ? 'bold' : ''} ${baseSize}px 'Segoe UI', sans-serif`;
            const textLines = obj.text.split('\n');
            const lineH = baseSize * 1.4;
            textLines.forEach((line, i) => {
                ctx.fillText(line, sx, sy + (baseSize * 0.8) + (i * lineH));
            });
        }
    } else if (obj.type === 'grid') {
        drawCoordinateGrid(obj);
    } else if (obj.type === 'image') {
        if (!obj._img) {
            if (imageCache.has(obj.src)) {
                obj._img = imageCache.get(obj.src);
            } else {
                const img = new Image();
                img.src = obj.src;
                img.onload = () => {
                    imageCache.set(obj.src, img);
                    requestDraw();
                };
                obj._img = img;
            }
        }
        if (obj._img && (obj._img.complete || obj._img.naturalWidth > 0)) {
            ctx.drawImage(obj._img, sx, sy, obj.w * scale, obj.h * scale);
        }
    }
    ctx.restore();
}

function drawSmoothPath(ctx, points) {
    if (points.length === 0) return;
    
    if (points.length === 1) {
        const p = points[0];
        ctx.beginPath();
        ctx.arc(p.x * scale + offsetX, p.y * scale + offsetY, 1, 0, Math.PI * 2);
        ctx.fill();
        return;
    }
    
    if (points.length === 2) {
        const p0 = points[0];
        const p1 = points[1];
        ctx.beginPath();
        ctx.moveTo(p0.x * scale + offsetX, p0.y * scale + offsetY);
        ctx.lineTo(p1.x * scale + offsetX, p1.y * scale + offsetY);
        ctx.stroke();
        return;
    }
    
    ctx.beginPath();
    const p0 = points[0];
    ctx.moveTo(p0.x * scale + offsetX, p0.y * scale + offsetY);
    
    for (let i = 1; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        ctx.quadraticCurveTo(p1.x * scale + offsetX, p1.y * scale + offsetY, midX * scale + offsetX, midY * scale + offsetY);
    }
    
    const lastPoint = points[points.length - 1];
    ctx.lineTo(lastPoint.x * scale + offsetX, lastPoint.y * scale + offsetY);
    ctx.stroke();
}

// ============================================
// ОТРИМАННЯ КООРДИНАТ
// ============================================

function getCoords(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { 
        x: (clientX - offsetX) / scale, 
        y: (clientY - offsetY) / scale,
        rawX: clientX, 
        rawY: clientY 
    };
}

// ============================================
// ПОЧАТОК РЕДАГУВАННЯ ТЕКСТУ
// ============================================

function startTextEdit(obj) {
    if (textEditor) stopTextEdit();
    
    editingObject = obj;
    selectedObjects = [];
    requestDraw();
    
    const bbox = getBBox(obj);
    const screenX = bbox.x * scale + offsetX;
    const screenY = bbox.y * scale + offsetY;
    
    const wrapper = document.createElement('div');
    wrapper.className = 'text-edit-wrapper';
    wrapper.style.left = (screenX - 10) + 'px';
    wrapper.style.top = (screenY - 5) + 'px';
    wrapper.style.minWidth = '100px';
    wrapper.style.minHeight = (obj.size * 1.4 * scale) + 'px';
    
    ['nw','n','ne','e','se','s','sw','w'].forEach(h => {
        const div = document.createElement('div');
        div.className = `handle ${h}`;
        div.dataset.handle = h;
        wrapper.appendChild(div);
    });
    
    const rotLine = document.createElement('div');
    rotLine.className = 'rotate-line';
    wrapper.appendChild(rotLine);
    
    const rotHandle = document.createElement('div');
    rotHandle.className = 'rotate-handle';
    rotHandle.dataset.handle = 'rotate';
    wrapper.appendChild(rotHandle);
    
    editorDiv = document.createElement('div');
    editorDiv.className = 'text-edit-content';
    editorDiv.contentEditable = true;
    editorDiv.style.color = obj.color;
    editorDiv.style.fontWeight = obj.isBold ? 'bold' : 'normal';
    editorDiv.style.fontSize = (obj.size * scale) + 'px';
    
    if (obj.text && obj.text.trim() !== '') {
        editorDiv.textContent = obj.text;
    } else {
        editorDiv.innerHTML = '<br>';
    }
    
    wrapper.appendChild(editorDiv);
    document.body.appendChild(wrapper);
    textEditor = wrapper;
    
    mathToolbarRow.classList.add('visible');
    
    function updateSize() {
        if (!editorDiv) return;
        const rect = editorDiv.getBoundingClientRect();
        wrapper.style.width = (rect.width + 20) + 'px';
        wrapper.style.height = (rect.height + 10) + 'px';
    }
    
    updateSize();
    
    setTimeout(() => {
        if (!editorDiv) return;
        editorDiv.focus();
        
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(editorDiv);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }, 50);
    
    editorDiv.addEventListener('input', () => {
        updateSize();
        updateTextObject();
    });
    
    editorDiv.addEventListener('blur', () => {
        setTimeout(() => {
            if (textEditor && document.activeElement !== editorDiv) {
                stopTextEdit();
            }
        }, 200);
    });
    
    const handles = wrapper.querySelectorAll('.handle, .rotate-handle');
    handles.forEach(h => {
        h.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            startTextResize(obj, h.dataset.handle, e, wrapper);
        });
    });
    
    editorDiv.addEventListener('mousedown', (e) => {
        if (e.target === editorDiv) {
            e.stopPropagation();
            startTextDrag(obj, e, wrapper);
        }
    });
}

// ============================================
// ЗАВЕРШЕННЯ РЕДАГУВАННЯ ТЕКСТУ
// ============================================

function stopTextEdit(cancel = false) {
    if (!textEditor) return;
    
    if (!cancel && editingObject) {
        saveHistory();
        editingObject.text = editorDiv.innerText;
        if (socket && socket.connected) socket.emit('update-object', editingObject);
    }
    
    if (textEditor.parentNode) {
        document.body.removeChild(textEditor);
    }
    textEditor = null;
    editorDiv = null;
    editingObject = null;
    mathToolbarRow.classList.remove('visible');
    hideAllPanels();
    requestDraw();
}

// ============================================
// ЗМІНА РОЗМІРУ ТЕКСТУ
// ============================================

function startTextResize(obj, handle, e, wrapper) {
    isResizing = true;
    resizeHandle = handle;
    const coords = getCoords(e);
    dragStartX = coords.x;
    dragStartY = coords.y;
    const startFontSize = obj.size;
    
    const onMove = (e) => {
        if (!isResizing) return;
        const c = getCoords(e);
        const dx = c.x - dragStartX;
        const dy = c.y - dragStartY;
        
        let scaleFactor = 1;
        if (handle === 'se' || handle === 's' || handle === 'e') {
            scaleFactor = Math.max(0.5, 1 + (dx + dy) / 200);
        } else if (handle === 'n') {
            scaleFactor = Math.max(0.5, 1 - dy / 100);
        } else if (handle === 'w') {
            scaleFactor = Math.max(0.5, 1 - dx / 100);
        }
        
        obj.size = Math.max(8, Math.min(150, startFontSize * scaleFactor));
        editorDiv.style.fontSize = (obj.size * scale) + 'px';
        updateTextSize();
        requestDraw();
    };
    
    const onUp = () => {
        isResizing = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        saveHistory();
        if (socket && socket.connected) socket.emit('update-object', obj);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

// ============================================
// ПЕРЕМІЩЕННЯ ТЕКСТУ
// ============================================

function startTextDrag(obj, e, wrapper) {
    isDragging = true;
    const coords = getCoords(e);
    dragStartX = coords.x - obj.x;
    dragStartY = coords.y - obj.y;
    editorDiv.style.cursor = 'grabbing';
    
    const onMove = (e) => {
        if (!isDragging) return;
        const c = getCoords(e);
        obj.x = c.x - dragStartX;
        obj.y = c.y - dragStartY;
        const bbox = getBBox(obj);
        wrapper.style.left = (bbox.x * scale + offsetX - 10) + 'px';
        wrapper.style.top = (bbox.y * scale + offsetY - 5) + 'px';
        requestDraw();
    };
    
    const onUp = () => {
        isDragging = false;
        editorDiv.style.cursor = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        saveHistory();
        if (socket && socket.connected) socket.emit('update-object', obj);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

// ============================================
// ПОДІЇ CANVAS
// ============================================

canvas.addEventListener('dblclick', (e) => {
    const coords = getCoords(e);
    
    const clickedObj = [...objects].reverse().find(obj => {
        if (obj.type === 'text') {
            return hitTest(obj, coords.x, coords.y, 2);
        }
        return false;
    });

    if (clickedObj) {
        e.preventDefault();
        e.stopPropagation();
        startTextEdit(clickedObj);
        requestDraw();
    }
});

canvas.addEventListener('mousedown', (e) => {
    if (e.detail === 2) return;
    
    const coords = getCoords(e);
    
    if (textEditor) { 
        stopTextEdit(); 
        selectedObjects = [];
        requestDraw();
        return; 
    }
    
    if (currentTool === 'shape' && selectedShapeType) {
        startDrawing(coords);
        return;
    }

    if (currentTool === 'fill') {
        performFill(coords.x, coords.y);
        return;
    }

    if (currentTool === 'text') {
        const existingText = [...objects].reverse().find(obj => {
            if (obj.type === 'text') {
                return hitTest(obj, coords.x, coords.y, 2);
            }
            return false;
        });
        
        if (existingText) {
            startTextEdit(existingText);
            requestDraw();
            return;
        }
        createNewText(coords);
        return;
    }

    if (currentTool === 'grid') {
        startDrawing(coords);
        return;
    }

    if (currentTool !== 'select' && currentTool !== 'hand') {
        if (currentTool === 'eraser') eraseAt(coords.x, coords.y);
        else startDrawing(coords);
        return;
    }
    
    if (currentTool === 'select') {
        let clickedObj = null;
        let clickedHandle = null;
        
        if (selectedObjects.length > 0) {
            clickedHandle = hitHandle(coords.x, coords.y);
        }
        
        if (!clickedHandle) {
            clickedObj = [...objects].reverse().find(obj => hitTest(obj, coords.x, coords.y, 2));
        }
        
        if (clickedHandle) {
            if (clickedHandle === 'rotate') startRotate(e);
            else startResizeGroup(clickedHandle, e);
            return;
        }
        
        if (clickedObj) {
            if (!selectedObjects.includes(clickedObj)) {
                if (!shiftKey) selectedObjects = [];
                selectedObjects.push(clickedObj);
            } else if (shiftKey) {
                selectedObjects = selectedObjects.filter(o => o !== clickedObj);
            }
            
            isDragging = true;
            dragStartX = coords.x;
            dragStartY = coords.y;
            
            startResizeState = selectedObjects.map(o => ({
                obj: o,
                x: o.x, y: o.y,
                ex: o.ex, ey: o.ey,
                points: o.points ? JSON.parse(JSON.stringify(o.points)) : null,
                w: o.w, h: o.h
            }));
            
            requestDraw();
        } else {
            selectedObjects = [];
            isSelectingArea = true;
            selectionStart = { x: coords.x, y: coords.y };
            selectionEnd = { x: coords.x, y: coords.y };
            requestDraw();
        }
    } else if (currentTool === 'hand') {
        isDragging = true;
        dragStartX = coords.rawX;
        dragStartY = coords.rawY;
    }
});

canvas.addEventListener('mousemove', (e) => {
    const coords = getCoords(e);
    
    if (currentTool === 'select' && selectedObjects.length > 0 && !isDragging && !isResizing && !isRotating && !isSelectingArea) {
        const handle = hitHandle(coords.x, coords.y);
        canvas.style.cursor = getCursor(handle);
    } else if (currentTool === 'select') canvas.style.cursor = isSelectingArea ? 'crosshair' : 'default';
    else if (currentTool === 'hand') canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
    else if (currentTool === 'eraser') {
        canvas.style.cursor = 'cell';
        if (e.buttons === 1) eraseAt(coords.x, coords.y);
    } else if (currentTool === 'pen') {
        canvas.style.cursor = 'pencil';
    } else if (currentTool === 'line' || currentTool === 'arrow' || currentTool === 'shape' || currentTool === 'rect') {
        canvas.style.cursor = 'crosshair';
    } else if (currentTool === 'grid') {
        canvas.style.cursor = 'crosshair';
    } else if (currentTool === 'text') {
        canvas.style.cursor = 'text';
    } else if (currentTool === 'fill') {
        canvas.style.cursor = 'crosshair';
    } else canvas.style.cursor = 'crosshair';
    
    if (!isDragging && !isResizing && !isRotating && !isDrawing && !isSelectingArea) return;
    
    if (isDragging && selectedObjects.length > 0) {
        const dx = coords.x - dragStartX;
        const dy = coords.y - dragStartY;
        
        startResizeState.forEach(state => {
            const o = state.obj;
            if (o.type === 'line' || o.type === 'arrow' || o.type === 'rect' || o.type === 'grid' || o.type === 'shape') {
                o.x = state.x + dx;
                o.y = state.y + dy;
                o.ex = state.ex + dx;
                o.ey = state.ey + dy;
                if (o.w !== undefined) o.w = state.w;
                if (o.h !== undefined) o.h = state.h;
            } else if (o.type === 'pen') {
                o.x = state.x + dx;
                o.y = state.y + dy;
                o.points = state.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
            } else {
                o.x = state.x + dx;
                o.y = state.y + dy;
            }
        });
        requestDraw();
    } 
    else if (isSelectingArea) {
        selectionEnd = { x: coords.x, y: coords.y };
        requestDraw();
    }
    else if (isDragging && currentTool === 'hand') {
        offsetX += coords.rawX - dragStartX;
        offsetY += coords.rawY - dragStartY;
        dragStartX = coords.rawX;
        dragStartY = coords.rawY;
        requestDraw();
    } 
    else if (isDrawing && currentPath) {
        if (currentPath.type === 'pen') {
            const lastPoint = currentPath.points.length > 0 
                ? currentPath.points[currentPath.points.length - 1] 
                : { x: currentPath.x, y: currentPath.y };
            
            const dist = Math.hypot(coords.x - lastPoint.x, coords.y - lastPoint.y);
            if (dist > 2 / scale) {
                const smoothedX = lastPoint.x + (coords.x - lastPoint.x) * SMOOTHING_FACTOR;
                const smoothedY = lastPoint.y + (coords.y - lastPoint.y) * SMOOTHING_FACTOR;
                currentPath.points.push({ x: smoothedX, y: smoothedY });
            }
        }
        else if (currentPath.type === 'shape' || currentPath.type === 'rect') {
            currentPath.w = coords.x - currentPath.x;
            currentPath.h = coords.y - currentPath.y;
        }
        else if (currentPath.type === 'line' || currentPath.type === 'arrow') {
            currentPath.ex = coords.x;
            currentPath.ey = coords.y;
        }
        else if (currentPath.type === 'grid') {
            currentPath.w = coords.x - currentPath.x;
            currentPath.h = coords.y - currentPath.y;
        }
        requestDraw();
    } 
    else if (isRotating && selectedObjects.length > 0) {
        const bbox = getGroupBBox(selectedObjects);
        const centerX = bbox.x + bbox.w / 2;
        const centerY = bbox.y + bbox.h / 2;
        
        const angle = Math.atan2(coords.y - centerY, coords.x - centerX);
        const degrees = angle * 180 / Math.PI + 90;
        
        selectedObjects.forEach(obj => {
            if (!obj.rotation) obj.rotation = 0;
            const originalRotation = startResizeState.originalRotation || 0;
            obj.rotation = originalRotation + (degrees - startResizeState.startAngle);
        });
        requestDraw();
    }
});

canvas.addEventListener('mouseup', () => {
    if (isSelectingArea) {
        isSelectingArea = false;
        
        const minX = Math.min(selectionStart.x, selectionEnd.x);
        const maxX = Math.max(selectionStart.x, selectionEnd.x);
        const minY = Math.min(selectionStart.y, selectionEnd.y);
        const maxY = Math.max(selectionStart.y, selectionEnd.y);
        
        const newSelection = objects.filter(obj => {
            const bbox = getBBox(obj);
            if (!bbox) return false;
            return !(bbox.x > maxX || bbox.x + bbox.w < minX || bbox.y > maxY || bbox.y + bbox.h < minY);
        });
        
        if (newSelection.length > 0) {
            if (!shiftKey) selectedObjects = [];
            newSelection.forEach(obj => {
                if (!selectedObjects.includes(obj)) selectedObjects.push(obj);
            });
        }
        requestDraw();
        return;
    }
    
    if (isDrawing && currentPath) {
        if (currentPath.type === 'pen' && currentPath.points.length > 1) {
            saveHistory();
            objects.push(currentPath);
            if (socket && socket.connected) socket.emit('new-object', currentPath);
        } else if (currentPath.type === 'shape') {
            if (Math.abs(currentPath.w) > 10 && Math.abs(currentPath.h) > 10) {
                saveHistory();
                currentPath.type = 'shape';
                currentPath.shapeType = selectedShapeType;
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'rect') {
            if (Math.abs(currentPath.w) > 2 && Math.abs(currentPath.h) > 2) {
                saveHistory();
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'line' || currentPath.type === 'arrow') {
            if (Math.abs(currentPath.ex - currentPath.x) > 2 || Math.abs(currentPath.ey - currentPath.y) > 2) {
                saveHistory();
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        } else if (currentPath.type === 'grid') {
            if (Math.abs(currentPath.w) > 50 && Math.abs(currentPath.h) > 50) {
                saveHistory();
                currentPath.type = 'grid';
                currentPath.gridSpacing = 40;
                currentPath.axisColor = '#000000';
                currentPath.gridColor = '#cccccc';
                objects.push(currentPath);
                if (socket && socket.connected) socket.emit('new-object', currentPath);
            }
        }
        isDrawing = false;
        currentPath = null;
        requestDraw();
    }
    
    if (isDragging || isResizing || isRotating) {
        if (isRotating || isResizing || (isDragging && selectedObjects.length > 0)) {
            saveHistory();
            if (socket && socket.connected) {
                selectedObjects.forEach(obj => {
                    socket.emit('update-object', obj);
                });
            }
        }
        isDragging = false; isResizing = false; isRotating = false;
    }
});

// ============================================
// ЛАСТИК
// ============================================

function eraseAt(mx, my) {
    const eraserRadius = 30 / scale;
    let changed = false;
    
    for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        let shouldRemove = false;
        
        if (obj.type === 'pen') {
            const allPoints = [{x: obj.x, y: obj.y}, ...obj.points];
            for (let p of allPoints) {
                if (Math.hypot(p.x - mx, p.y - my) < eraserRadius) {
                    shouldRemove = true;
                    break;
                }
            }
        } else if (obj.type === 'line' || obj.type === 'arrow') {
            if (distToSegment(mx, my, obj.x, obj.y, obj.ex, obj.ey) < eraserRadius) shouldRemove = true;
        } else if (obj.type === 'rect' || obj.type === 'shape') {
            const bbox = getBBox(obj);
            if (bbox && mx >= bbox.x && mx <= bbox.x + bbox.w && my >= bbox.y && my <= bbox.y + bbox.h) {
                shouldRemove = true;
            }
        } else if (obj.type === 'text' || obj.type === 'image' || obj.type === 'grid') {
            const bbox = getBBox(obj);
            if (bbox && mx >= bbox.x && mx <= bbox.x + bbox.w && my >= bbox.y && my <= bbox.y + bbox.h) {
                shouldRemove = true;
            }
        }
        
        if (shouldRemove) {
            saveHistory();
            const deletedObj = objects.splice(i, 1)[0];
            selectedObjects = selectedObjects.filter(o => o !== deletedObj);
            changed = true;
            if (socket && socket.connected) socket.emit('delete-object', deletedObj.id);
        }
    }
    if (changed) { 
        if (socket && socket.connected) socket.emit('update-all', objects); 
        requestDraw(); 
    }
}

// ============================================
// ПОЧАТОК МАЛЮВАННЯ
// ============================================

function startDrawing(coords) {
    isDrawing = true;
    currentPath = {
        id: generateId(),
        type: currentTool,
        color: currentPenColor,
        width: document.getElementById('lineWidth').value,
        x: coords.x, y: coords.y, ex: coords.x, ey: coords.y,
        w: 0, h: 0
    };
    
    if (selectedLineToolType === 'dotted') {
        currentPath.lineStyle = 'dotted';
    }
    
    if (currentTool === 'pen') currentPath.points = [];
    if (currentTool === 'shape') {
        currentPath.shapeType = selectedShapeType;
    }
}

// ============================================
// ЗМІНА РОЗМІРУ ГРУПИ
// ============================================

function startResizeGroup(handle, e) {
    isResizing = true;
    resizeHandle = handle;
    const coords = getCoords(e);
    dragStartX = coords.x; dragStartY = coords.y;
    
    const groupBBox = getGroupBBox(selectedObjects);
    
    startResizeState = {
        objects: selectedObjects.map(o => ({
            obj: o,
            x: o.x, y: o.y, 
            ex: o.ex, ey: o.ey, 
            w: o.w, h: o.h, 
            points: o.points ? JSON.parse(JSON.stringify(o.points)) : null,
            rotation: o.rotation || 0
        })),
        groupBBox: groupBBox,
        originalRotation: selectedObjects[0]?.rotation || 0,
        startAngle: 0
    };
    
    if (handle === 'rotate') {
        isRotating = true;
        const centerX = groupBBox.x + groupBBox.w / 2;
        const centerY = groupBBox.y + groupBBox.h / 2;
        startResizeState.startAngle = Math.atan2(coords.y - centerY, coords.x - centerX) * 180 / Math.PI;
    }

    const onMove = (e) => {
        if (!isResizing && !isRotating) return;
        const c = getCoords(e);
        
        if (isRotating) {
            const centerX = startResizeState.groupBBox.x + startResizeState.groupBBox.w / 2;
            const centerY = startResizeState.groupBBox.y + startResizeState.groupBBox.h / 2;
            const currentAngle = Math.atan2(c.y - centerY, c.x - centerX) * 180 / Math.PI;
            const deltaAngle = currentAngle - startResizeState.startAngle;
            
            selectedObjects.forEach(obj => {
                obj.rotation = (startResizeState.originalRotation + deltaAngle) % 360;
            });
        } else {
            const oldBBox = startResizeState.groupBBox;
            let newW = oldBBox.w;
            let newH = oldBBox.h;
            let newX = oldBBox.x;
            let newY = oldBBox.y;
            
            if (handle.includes('e')) newW = c.x - oldBBox.x;
            if (handle.includes('w')) { newW = oldBBox.w + (oldBBox.x - c.x); newX = c.x; }
            if (handle.includes('s')) newH = c.y - oldBBox.y;
            if (handle.includes('n')) { newH = oldBBox.h + (oldBBox.y - c.y); newY = c.y; }
            
            if (newW < 10) newW = 10;
            if (newH < 10) newH = 10;
            if (handle.includes('e') && newW < 10) newW = 10;
            if (handle.includes('w') && newW < 10) { newX = oldBBox.x + oldBBox.w - 10; newW = 10; }
            if (handle.includes('s') && newH < 10) newH = 10;
            if (handle.includes('n') && newH < 10) { newY = oldBBox.y + oldBBox.h - 10; newH = 10; }

            const scaleX = newW / oldBBox.w;
            const scaleY = newH / oldBBox.h;

            startResizeState.objects.forEach(state => {
                const o = state.obj;
                
                if (o.type === 'line' || o.type === 'arrow' || o.type === 'rect' || o.type === 'grid' || o.type === 'shape') {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    o.ex = newX + (state.ex - oldBBox.x) * scaleX;
                    o.ey = newY + (state.ey - oldBBox.y) * scaleY;
                    if (o.type === 'grid' || o.type === 'shape') {
                        o.w = state.w * scaleX;
                        o.h = state.h * scaleY;
                    }
                } else if (o.type === 'pen') {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    o.points = state.points.map(p => ({
                        x: newX + (p.x - oldBBox.x) * scaleX,
                        y: newY + (p.y - oldBBox.y) * scaleY
                    }));
                } else {
                    o.x = newX + (state.x - oldBBox.x) * scaleX;
                    o.y = newY + (state.y - oldBBox.y) * scaleY;
                    
                    if (o.type === 'image') {
                        o.w = state.w * scaleX;
                        o.h = state.h * scaleY;
                    } else if (o.type === 'text') {
                        const avgScale = (scaleX + scaleY) / 2;
                        o.size = Math.max(8, state.obj.size * avgScale);
                    }
                }
            });
        }
        requestDraw();
    };
    
    const onUp = () => { 
        isResizing = false; 
        isRotating = false;
        document.removeEventListener('mousemove', onMove); 
        document.removeEventListener('mouseup', onUp); 
        saveHistory(); 
        if (socket && socket.connected) {
            selectedObjects.forEach(obj => {
                socket.emit('update-object', obj);
            });
        }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

function startRotate(e) {}

// ============================================
// СТВОРЕННЯ НОВОГО ТЕКСТУ
// ============================================

function createNewText(coords) {
    const obj = {
        id: generateId(),
        type: 'text', 
        x: coords.x, 
        y: coords.y, 
        text: '', 
        color: currentPenColor,
        size: 20, 
        isBold: document.getElementById('boldText').checked,
        rotation: 0
    };
    saveHistory();
    objects.push(obj); 
    selectedObjects = [obj];
    if (socket && socket.connected) socket.emit('new-object', obj);
    requestDraw();
    startTextEdit(obj);
}

// ============================================
// ВИБІР ІНСТРУМЕНТУ
// ============================================

function setTool(tool) {
    currentTool = tool;
    fillMode = false;
    document.getElementById('fillToolBtn').classList.remove('fill-active');
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
    if (tool !== 'select' && selectedObjects.length > 0) { selectedObjects = []; requestDraw(); }
    
    if (tool === 'select') {
        canvas.className = 'cursor-default';
        mathToolbarRow.classList.remove('visible');
        hideAllPanels();
    }
    else if (tool === 'hand') canvas.className = 'cursor-grab';
    else if (tool === 'eraser') canvas.className = 'cursor-eraser';
    else if (tool === 'pen') canvas.className = 'cursor-pencil';
    else if (tool === 'line' || tool === 'arrow' || tool === 'shape' || tool === 'rect') canvas.className = 'cursor-crosshair';
    else if (tool === 'grid') canvas.className = 'cursor-grid';
    else if (tool === 'text') {
        canvas.className = 'cursor-text';
        mathToolbarRow.classList.add('visible');
    }
    else if (tool === 'fill') canvas.className = 'cursor-crosshair';
    else canvas.className = 'cursor-crosshair';
}

document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => btn.onclick = () => setTool(btn.dataset.tool));

// ============================================
// КНОПКИ ПАНЕЛІ
// ============================================

document.getElementById('clearBtn').onclick = () => { 
    if(confirm("Очистити дошку?")) {
        saveHistory();
        objects = []; 
        selectedObjects = [];
        if (textEditor) stopTextEdit();
        if (socket && socket.connected) socket.emit('delete-board');
        requestDraw();
    }
};

function createNewBoard() { 
    const newId = Math.random().toString(36).substr(2, 9);
    window.location.href = '/' + newId; 
}

const colorPickerBtn = document.getElementById('colorPickerBtn');
const colorPickerInput = document.getElementById('colorPickerInput');

colorPickerBtn.addEventListener('click', () => {
    colorPickerInput.click();
});

colorPickerInput.addEventListener('input', (e) => {
    selectPenColor(e.target.value);
});

// ============================================
// МАСШТАБУВАННЯ
// ============================================

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const oldScale = scale;
    scale *= delta;
    scale = Math.min(Math.max(scale, 0.2), 5.0);
    
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const mx = (mouseX - offsetX) / oldScale;
    const my = (mouseY - offsetY) / oldScale;
    
    offsetX = mouseX - mx * scale;
    offsetY = mouseY - my * scale;
    
    updateZoomDisplay();
    
    if (textEditor && editingObject) {
        const bbox = getBBox(editingObject);
        textEditor.style.left = (bbox.x * scale + offsetX - 10) + 'px';
        textEditor.style.top = (bbox.y * scale + offsetY - 5) + 'px';
    }
    
    requestDraw();
}, { passive: false });

// ============================================
// ВСТАВКА ЗОБРАЖЕНЬ
// ============================================

window.addEventListener('paste', (e) => {
    if (textEditor) return;
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.indexOf('image') !== -1) {
            const blob = item.getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const centerX = (canvas.width/2 - offsetX) / scale;
                    const centerY = (canvas.height/2 - offsetY) / scale;
                    const obj = { 
                        id: generateId(),
                        type: 'image', 
                        src: event.target.result, 
                        x: centerX - img.width/4, 
                        y: centerY - img.height/4, 
                        w: img.width/2, 
                        h: img.height/2, 
                        rotation: 0 
                    };
                    imageCache.set(obj.src, img);
                    obj._img = img;
                    
                    saveHistory();
                    objects.push(obj); 
                    selectedObjects = [obj];
                    if (socket && socket.connected) socket.emit('new-object', obj); 
                    requestDraw();
                };
            };
            reader.readAsDataURL(blob);
        }
    }
});

// ============================================
// SOCKET.IO ПОДІЇ
// ============================================

socket.on('init-history', (h) => { 
    objects = h || [];
    restoreImages(objects);
    historyStack = [{ objects: JSON.parse(JSON.stringify(objects)), view: { scale, offsetX, offsetY } }];
    historyIndex = 0;
    console.log('Initialized history, historyStack length:', historyStack.length);
    requestDraw();
});

socket.on('new-object', (o) => { 
    const exists = objects.some(obj => obj.id === o.id);
    if (!exists) {
        objects.push(o);
        if (o.type === 'image' && o.src) {
            if (imageCache.has(o.src)) {
                o._img = imageCache.get(o.src);
            } else {
                const img = new Image();
                img.src = o.src;
                img.onload = () => {
                    imageCache.set(o.src, img);
                    requestDraw();
                };
                o._img = img;
            }
        }
        saveHistory();
        requestDraw();
    }
});

socket.on('update-object', (updatedObj) => { 
    const index = objects.findIndex(o => o.id === updatedObj.id);
    if (index !== -1) {
        const oldImg = objects[index]._img;
        objects[index] = updatedObj;
        if (oldImg) objects[index]._img = oldImg;
        
        if (updatedObj.type === 'image' && updatedObj.src && !updatedObj._img) {
            if (imageCache.has(updatedObj.src)) {
                updatedObj._img = imageCache.get(updatedObj.src);
            } else {
                const img = new Image();
                img.src = updatedObj.src;
                img.onload = () => {
                    imageCache.set(updatedObj.src, img);
                    requestDraw();
                };
                updatedObj._img = img;
            }
        }
        
        requestDraw();
    }
});

socket.on('update-all', (newObjects) => { 
    newObjects.forEach(obj => {
        if (obj.type === 'image' && obj.src) {
            if (imageCache.has(obj.src)) {
                obj._img = imageCache.get(obj.src);
            } else {
                const img = new Image();
                img.src = obj.src;
                img.onload = () => {
                    imageCache.set(obj.src, img);
                    requestDraw();
                };
                obj._img = img;
            }
        }
    });
    
    objects = newObjects; 
    requestDraw(); 
});

socket.on('delete-object', (objId) => { 
    objects = objects.filter(o => o.id !== objId);
    selectedObjects = selectedObjects.filter(o => o.id !== objId);
    requestDraw();
});

socket.on('board-deleted', () => { 
    objects = []; 
    selectedObjects = []; 
    historyStack = [];
    historyIndex = -1;
    requestDraw(); 
});

</script>
