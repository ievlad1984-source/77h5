<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Совместная доска</title>
    <!-- Подключаем библиотеку через локальный путь сервера -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; transition: 0.2s; }
        button:hover { background: #bdc3c7; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { display: block; cursor: crosshair; background-color: #ffffff; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('text')" id="textBtn">Текст</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Прямоугольник</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="clearBoard()" style="background:#e74c3c; color:white; margin-left: auto;">Очистить всё</button>
</div>

<div id="canvas-container"><canvas id="canvas"></canvas></div>

<script>
    // Подключение к серверу
    const socket = io(); // Автоматически подключается к текущему домену
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    
    let tool = 'pen', isDrawing = false, objects = [], currentObj = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 50;
        render();
    }
    window.onresize = resize;
    resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
    }

    // --- СИНХРОНИЗАЦИЯ ---

    // 1. Получаем всю историю при входе
    socket.on('init-history', (history) => {
        objects = history;
        render();
    });

    // 2. Получаем новые объекты от других в реальном времени
    socket.on('new-object', (obj) => {
        objects.push(obj);
        render();
    });

    // 3. Слушаем очистку доски
    socket.on('clear-board', () => {
        objects = [];
        render();
    });

    // --- ЛОГИКА РИСОВАНИЯ ---

    function addText(x, y) {
        const content = prompt("Введите текст:");
        if (!content) return;
        const textObj = { type: 'text', content, x, y, color: colorPicker.value };
        
        objects.push(textObj);
        socket.emit('new-object', textObj); // Отправляем на сервер
        render();
    }

    function render() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        objects.forEach(draw);
        if (currentObj) draw(currentObj);
    }

    function draw(obj) {
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        if (obj.type === 'pen') {
            ctx.beginPath();
            obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
        } else if (obj.type === 'rect') {
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'text') {
            ctx.font = "20px Arial";
            ctx.fillText(obj.content, obj.x, obj.y);
        }
    }

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;

        if (tool === 'text') {
            addText(mX, mY);
            return;
        }

        isDrawing = true;
        if (tool === 'pen') {
            currentObj = { type: 'pen', color: colorPicker.value, points: [{x: mX, y: mY}] };
        } else if (tool === 'rect') {
            currentObj = { type: 'rect', color: colorPicker.value, x: mX, y: mY, w: 0, h: 0 };
        }
    };

    window.onmousemove = (e) => {
        if (!isDrawing || !currentObj) return;
        const rect = canvas.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;

        if (tool === 'pen') {
            currentObj.points.push({x: mX, y: mY});
        } else if (tool === 'rect') {
            currentObj.w = mX - currentObj.x;
            currentObj.h = mY - currentObj.y;
        }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) {
            objects.push(currentObj);
            socket.emit('new-object', currentObj); // Синхронизируем с сервером
        }
        isDrawing = false;
        currentObj = null;
        render();
    };

    function clearBoard() {
        if(confirm("Очистить доску для всех пользователей?")) {
            objects = [];
            render();
            socket.emit('clear-board');
        }
    }
</script>
</body>
</html>
