<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>iDroo Clone Pro - Multi-Board Realtime</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f0f0f0; }
        
        /* Панель інструментів */
        #toolbar {
            position: absolute; top: 0; left: 0; width: 100%; background: #f5f6f7; 
            padding: 5px 15px; display: flex; gap: 12px; border-bottom: 1px solid #ccc;
            z-index: 100; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* Бічна панель дошок */
        #side-panel {
            position: absolute; top: 50px; left: 10px; width: 200px; background: white;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 90;
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
        }
        .board-list-header { font-weight: bold; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        #boards-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .board-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: #f8f9fa; border: 1px solid #ddd;
            border-radius: 4px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .board-item:hover { background: #e9ecef; }
        .board-item.active { border-color: #007bff; background: #e7f1ff; font-weight: bold; }
        .del-board-btn { color: #d93025; font-weight: bold; padding: 0 5px; cursor: pointer; font-size: 16px; }
        .del-board-btn:hover { color: #ff0000; }

        .tool-group { display: flex; gap: 4px; border-right: 1px solid #ddd; padding-right: 10px; align-items: center; }
        .tool-btn { padding: 6px 10px; cursor: pointer; border: 1px solid transparent; background: transparent; border-radius: 3px; font-size: 13px; }
        .tool-btn:hover { background: #e5f1fb; border-color: #a5d7ff; }
        .tool-btn.active { background: #cce4f7; border-color: #0056b3; }
        
        #zoom-display { position: absolute; bottom: 20px; right: 20px; background: white; padding: 5px 12px; border: 1px solid #ccc; z-index: 100; border-radius: 4px; font-size: 12px; }
        canvas { display: block; background: #fff; touch-action: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="tool-group">
        <button class="tool-btn" onclick="createNewBoard()" style="background: #28a745; color: white;">+ Нова дошка</button>
    </div>
    <div class="tool-group">
        <button class="tool-btn" data-tool="select">🔍 Виділення</button>
        <button class="tool-btn" data-tool="hand">✋ Рука</button>
    </div>
    <div class="tool-group">
        <button class="tool-btn active" data-tool="pen">✏️ Олівець</button>
        <button class="tool-btn" data-tool="line">📏 Лінія</button>
        <button class="tool-btn" data-tool="rect">⬜ Прямокутник</button>
        <button class="tool-btn" data-tool="eraser">🧽 Ластик</button>
    </div>
    <div class="tool-group">
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="lineWidth" min="1" max="20" value="3">
    </div>
    <div class="tool-group">
        <button class="tool-btn" onclick="socket.emit('undo')">↩ Undo</button>
    </div>
    <button class="tool-btn" onclick="copyInvite()" style="margin-left: auto;">🔗 Копіювати посилання</button>
</div>

<div id="side-panel">
    <div class="board-list-header">Мої дошки</div>
    <div id="boards-list"></div>
</div>

<div id="zoom-display">100%</div>
<canvas id="board"></canvas>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    
    // Отримання ID з URL
    const boardId = window.location.pathname.substring(1) || 'main';
    const socket = io({ query: { boardId } });

    let objects = [], remoteDrawings = {};
    let currentTool = 'pen', isDrawing = false, currentObj = null;
    let selectedObjects = [], selectionRect = null;
    let scale = 1.0, offsetX = 0, offsetY = 0;
    let dragStartX, dragStartY;

    // --- ЛОГІКА КЕРУВАННЯ СПИСКОМ ДОШОК (Локальний індекс) ---

    function updateBoardsRegistry() {
        let registry = JSON.parse(localStorage.getItem('boards_registry')) || [];
        if (!registry.includes(boardId)) {
            registry.push(boardId);
            localStorage.setItem('boards_registry', JSON.stringify(registry));
        }
        renderBoardsList();
    }

    function renderBoardsList() {
        const listContainer = document.getElementById('boards-list');
        const registry = JSON.parse(localStorage.getItem('boards_registry')) || [];
        
        listContainer.innerHTML = registry.map(id => `
            <div class="board-item ${id === boardId ? 'active' : ''}" onclick="window.location.pathname='/${id}'">
                <span>Дошка ${id.substring(0,6)}</span>
                <span class="del-board-btn" onclick="removeBoardFromList('${id}', event)">×</span>
            </div>
        `).join('');
    }

    function createNewBoard() {
        const newId = Math.random().toString(36).substring(2, 9);
        window.location.pathname = '/' + newId;
    }

    function removeBoardFromList(id, event) {
        event.stopPropagation();
        if (confirm(`Видалити дошку ${id} зі списку? (Дані на сервері залишаться, якщо їх не очистити)`)) {
            let registry = JSON.parse(localStorage.getItem('boards_registry')) || [];
            registry = registry.filter(b => b !== id);
            localStorage.setItem('boards_registry', JSON.stringify(registry));
            
            // Якщо видаляємо поточну, переходимо на головну або першу в списку
            if (id === boardId) {
                window.location.pathname = registry.length > 0 ? '/' + registry[0] : '/main';
            } else {
                renderBoardsList();
            }
        }
    }

    // --- SOCKET EVENTS ---

    socket.on('init-history', (data) => {
        objects = data.map(processObj);
        draw();
    });

    socket.on('new-object', (obj) => {
        objects.push(processObj(obj));
        draw();
    });

    socket.on('drawing-progress', (data) => {
        remoteDrawings[data.userId] = data;
        draw();
    });

    socket.on('clear-progress', (userId) => {
        delete remoteDrawings[userId];
        draw();
    });

    function processObj(obj) {
        if (obj.type === 'image') {
            const img = new Image();
            img.src = obj.imgSrc;
            img.onload = draw;
            return { ...obj, img };
        }
        return obj;
    }

    // --- DRAWING ENGINE ---

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.onresize = resize;
    resize();

    function getCoords(e) {
        return { x: (e.clientX - offsetX) / scale, y: (e.clientY - offsetY) / scale };
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Малюємо сітку
        ctx.beginPath();
        ctx.strokeStyle = '#f0f0f0';
        ctx.lineWidth = 1/scale;
        for(let x=-2000; x<5000; x+=50) { ctx.moveTo(x, -2000); ctx.lineTo(x, 5000); }
        for(let y=-2000; y<5000; y+=50) { ctx.moveTo(-2000, y); ctx.lineTo(5000, y); }
        ctx.stroke();

        const all = [...objects, ...Object.values(remoteDrawings)];
        if (currentObj) all.push(currentObj);

        all.forEach(obj => {
            const isSel = selectedObjects.includes(obj);
            ctx.lineWidth = obj.width || 3;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isSel ? '#007bff' : (obj.type === 'eraser' ? '#fff' : obj.color);
            
            ctx.beginPath();
            if (obj.type === 'pen' || obj.type === 'eraser') {
                if (obj.points?.length > 0) {
                    ctx.moveTo(obj.points[0].x, obj.points[0].y);
                    obj.points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.stroke();
                }
            } else if (obj.type === 'line') {
                ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.ex, obj.ey); ctx.stroke();
            } else if (obj.type === 'rect') {
                ctx.strokeRect(obj.x, obj.y, obj.ex - obj.x, obj.ey - obj.y);
            } else if (obj.type === 'image' && obj.img) {
                ctx.drawImage(obj.img, obj.x, obj.y, obj.ex - obj.x, obj.ey - obj.y);
            }

            if (isSel) {
                ctx.setLineDash([5/scale, 5/scale]);
                ctx.strokeRect(Math.min(obj.x, obj.ex??obj.x)-5, Math.min(obj.y, obj.ey??obj.y)-5, Math.abs((obj.ex??obj.x+100)-obj.x)+10, Math.abs((obj.ey??obj.y+30)-obj.y)+10);
                ctx.setLineDash([]);
            }
        });

        if (selectionRect) {
            ctx.strokeStyle = 'rgba(0, 123, 255, 0.5)';
            ctx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
        }
        ctx.restore();
    }

    // --- INTERACTION ---

    canvas.onmousedown = (e) => {
        const coords = getCoords(e);
        isDrawing = true;
        dragStartX = coords.x; dragStartY = coords.y;

        if (currentTool === 'select') {
            const hit = [...objects].reverse().find(o => coords.x >= o.x-10 && coords.x <= (o.ex||o.x+100)+10);
            if (hit) selectedObjects = [hit];
            else { selectedObjects = []; selectionRect = {x: coords.x, y: coords.y, w: 0, h: 0}; }
            draw(); return;
        }

        currentObj = {
            type: currentTool, x: coords.x, y: coords.y, ex: coords.x, ey: coords.y,
            color: document.getElementById('colorPicker').value,
            width: parseInt(document.getElementById('lineWidth').value),
            points: [{x: coords.x, y: coords.y}]
        };
    };

    window.onmousemove = (e) => {
        if (!isDrawing) return;
        const coords = getCoords(e);

        if (currentTool === 'hand') {
            offsetX += e.movementX; offsetY += e.movementY;
        } else if (currentTool === 'select') {
            if (selectionRect) {
                selectionRect.w = coords.x - selectionRect.x;
                selectionRect.h = coords.y - selectionRect.y;
            } else {
                const dx = coords.x - dragStartX, dy = coords.y - dragStartY;
                selectedObjects.forEach(obj => {
                    obj.x += dx; obj.y += dy;
                    if (obj.ex) obj.ex += dx; if (obj.ey) obj.ey += dy;
                    obj.points?.forEach(p => { p.x += dx; p.y += dy; });
                });
                dragStartX = coords.x; dragStartY = coords.y;
            }
        } else if (currentObj) {
            if (currentTool === 'pen' || currentTool === 'eraser') currentObj.points.push({x: coords.x, y: coords.y});
            else { currentObj.ex = coords.x; currentObj.ey = coords.y; }
            socket.emit('drawing-progress', currentObj);
        }
        draw();
    };

    window.onmouseup = () => {
        if (currentObj) {
            socket.emit('new-object', currentObj);
            objects.push(currentObj);
        } else if (currentTool === 'select' && selectedObjects.length > 0) {
            socket.emit('update-all', objects);
        }
        isDrawing = false; currentObj = null; selectionRect = null; draw();
    };

    canvas.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        document.getElementById('zoom-display').innerText = `${Math.round(scale * 100)}%`;
        draw();
    };

    function copyInvite() {
        navigator.clipboard.writeText(window.location.href);
        alert("Посилання скопійовано!");
    }

    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
        };
    });

    updateBoardsRegistry();
</script>
</body>
</html>
