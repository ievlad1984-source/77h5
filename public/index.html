<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная доска</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; overflow: hidden; }
        canvas { display: block; background: white; }
        .status-bar { position: absolute; bottom: 10px; right: 20px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('eraser')" id="eraserBtn">🧽 Ластик</button>
    <button onclick="setTool('line')" id="lineBtn">📏 Линия</button>
    <button onclick="setTool('text')" id="textBtn">Текст</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Прямоугольник</button>
    <button onclick="setTool('hand')" id="handBtn">✋ Рука</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="clearBoard()" style="background:#e74c3c; color:white; margin-left: auto;">Очистить всё</button>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div class="status-bar" id="zoomInfo">Масштаб: 100% | Скролл: Зум | Ctrl+V: Вставка</div>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const zoomInfo = document.getElementById('zoomInfo');
    
    let tool = 'pen', isDrawing = false, objects = [], currentObj = null;
    let scale = 1, offsetX = 0, offsetY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 50;
        render();
    }
    window.onresize = resize;
    resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
        canvas.style.cursor = t === 'hand' ? 'grab' : 'crosshair';
    }

    // ВСТАВКА КАРТИНКИ
    window.addEventListener('paste', (e) => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (item) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const x = (canvas.width/2 - offsetX) / scale;
                const y = (canvas.height/2 - offsetY) / scale;
                const obj = { type: 'image', src: event.target.result, x, y, w: 300, h: 200 };
                objects.push(obj);
                socket.emit('new-object', obj);
                render();
            };
            reader.readAsDataURL(item.getAsFile());
        }
    });

    // ЗУМ
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const oldScale = scale;
        scale = Math.min(Math.max(0.1, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 4);
        const mX = e.clientX, mY = e.clientY - 50;
        offsetX -= (mX - offsetX) * (scale / oldScale - 1);
        offsetY -= (mY - offsetY) * (scale / oldScale - 1);
        zoomInfo.innerText = `Масштаб: ${Math.round(scale * 100)}% | Скролл: Зум | Ctrl+V: Вставка`;
        render();
    }, { passive: false });

    socket.on('init-history', (history) => { objects = history; render(); });
    socket.on('new-object', (obj) => { objects.push(obj); render(); });
    socket.on('clear-board', () => { objects = []; render(); });

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // РИСУЕМ СЕТКУ (вне трансформации для производительности)
        drawGrid();

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        objects.forEach(draw);
        if (currentObj) draw(currentObj);
        
        ctx.restore();
    }

    function drawGrid() {
        const gridSize = 30 * scale;
        ctx.beginPath();
        ctx.strokeStyle = '#e8e8e8';
        ctx.lineWidth = 1;
        for (let x = offsetX % gridSize; x < canvas.width; x += gridSize) {
            ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
        }
        for (let y = offsetY % gridSize; y < canvas.height; y += gridSize) {
            ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();
    }

    function draw(obj) {
        ctx.save();
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineWidth = obj.width || 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Эффект ластика
        if (obj.type === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 20; // Ластик шире ручки
        }

        if (obj.type === 'pen' || obj.type === 'eraser') {
            ctx.beginPath();
            obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
        } else if (obj.type === 'rect') {
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'line') {
            ctx.beginPath(); ctx.moveTo(obj.x1, obj.y1); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();
        } else if (obj.type === 'text') {
            ctx.font = "20px Arial"; ctx.fillText(obj.content, obj.x, obj.y);
        } else if (obj.type === 'image') {
            const img = new Image(); img.src = obj.src;
            if (img.complete) ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
            else img.onload = () => render();
        }
        ctx.restore();
    }

    canvas.onmousedown = (e) => {
        const mX = (e.clientX - offsetX) / scale;
        const mY = (e.clientY - 50 - offsetY) / scale;
        isDrawing = true;

        if (tool === 'hand') { canvas.style.cursor = 'grabbing'; return; }
        if (tool === 'text') { addText(mX, mY); isDrawing = false; return; }

        const common = { color: colorPicker.value, x: mX, y: mY };
        if (tool === 'pen' || tool === 'eraser') {
            currentObj = { type: tool, ...common, points: [{x: mX, y: mY}] };
        } else if (tool === 'rect') {
            currentObj = { type: 'rect', ...common, w: 0, h: 0 };
        } else if (tool === 'line') {
            currentObj = { type: 'line', ...common, x1: mX, y1: mY, x2: mX, y2: mY };
        }
    };

    window.onmousemove = (e) => {
        if (!isDrawing) return;
        if (tool === 'hand') {
            offsetX += e.movementX;
            offsetY += e.movementY;
        } else if (currentObj) {
            const mX = (e.clientX - offsetX) / scale;
            const mY = (e.clientY - 50 - offsetY) / scale;
            if (currentObj.points) currentObj.points.push({x: mX, y: mY});
            else if (tool === 'rect') { currentObj.w = mX - currentObj.x; currentObj.h = mY - currentObj.y; }
            else if (tool === 'line') { currentObj.x2 = mX; currentObj.y2 = mY; }
        }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) {
            objects.push(currentObj);
            socket.emit('new-object', currentObj);
        }
        isDrawing = false; currentObj = null;
        if (tool === 'hand') canvas.style.cursor = 'grab';
        render();
    };

    function addText(x, y) {
        const content = prompt("Введите текст:");
        if (!content) return;
        const textObj = { type: 'text', content, x, y, color: colorPicker.value };
        objects.push(textObj);
        socket.emit('new-object', textObj);
        render();
    }

    function clearBoard() {
        if(confirm("Очистить всё?")) { objects = []; socket.emit('clear-board'); render(); }
    }
</script>
</body>
</html>
