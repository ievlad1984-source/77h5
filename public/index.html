<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Shared Whiteboard with Math</title>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Подключаем MathJax для рендеринга формул -->
    <script src="https://polyfill.io"></script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>
    
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; background: #f0f0f0; }
        .toolbar { background: #2c3e50; padding: 10px; display: flex; gap: 8px; align-items: center; z-index: 10; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; background: #ecf0f1; font-weight: bold; transition: 0.2s; }
        button:hover { background: #bdc3c7; }
        button.active { background: #3498db; color: white; }
        #canvas-container { flex-grow: 1; position: relative; background: #fff; }
        canvas { display: block; cursor: crosshair; background-color: #ffffff; }
        /* Скрытый блок для работы MathJax */
        #math-buffer { position: absolute; visibility: hidden; top: 0; left: 0; }
    </style>
</head>
<body>

<!-- Буфер для генерации формул -->
<div id="math-buffer"></div>

<div class="toolbar">
    <button onclick="setTool('pen')" id="penBtn" class="active">✏️ Ручка</button>
    <button onclick="setTool('text')" id="textBtn">Текст</button>
    <button onclick="setTool('rect')" id="rectBtn">⬜ Квадрат</button>
    <button onclick="addFormulaPrompt()" id="formulaBtn" style="background: #9b59b6; color: white;">Σ Формула</button>
    <input type="color" id="colorPicker" value="#000000">
    <button onclick="clearBoard()" style="background:#e74c3c; color:white; margin-left: auto;">Очистить всё</button>
</div>

<div id="canvas-container"><canvas id="canvas"></canvas></div>

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const mathBuffer = document.getElementById('math-buffer');
    
    let tool = 'pen', isDrawing = false, objects = [], currentObj = null;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 50;
        render();
    }
    window.onresize = resize;
    resize();

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        if(document.getElementById(t + 'Btn')) document.getElementById(t + 'Btn').classList.add('active');
    }

    // --- ЛОГИКА МАТЕМАТИЧЕСКИХ ФОРМУЛ ---

    async function addFormulaPrompt() {
        const latex = prompt("Введите формулу в формате LaTeX (например, x^2 + y^2 = r^2 или \\frac{a}{b}):", "E=mc^2");
        if (!latex) return;

        // 1. Рендерим формулу в скрытый блок
        mathBuffer.innerHTML = `\\(${latex}\\)`;
        await MathJax.typesetPromise([mathBuffer]);

        // 2. Получаем SVG данные из отрендеренного MathJax
        const svg = mathBuffer.querySelector('svg');
        const svgData = new XMLSerializer().serializeToString(svg);
        const svgSize = svg.getBoundingClientRect();

        // 3. Создаем объект изображения для отрисовки на Canvas
        const img = new Image();
        const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);

        img.onload = () => {
            const formulaObj = {
                type: 'formula',
                src: url,
                x: canvas.width / 2 - (svgSize.width / 2),
                y: canvas.height / 2 - (svgSize.height / 2),
                w: svgSize.width * 1.5, // Немного увеличим для четкости
                h: svgSize.height * 1.5,
                color: colorPicker.value
            };
            objects.push(formulaObj);
            socket.emit('new-object', formulaObj);
            render();
            // Освобождаем память
            // URL.revokeObjectURL(url); // Можно раскомментировать, если сохранять src в base64
        };
        img.src = url;
    }

    // --- СЕТЕВАЯ ЧАСТЬ ---

    socket.on('init-history', (history) => { objects = history; render(); });
    socket.on('new-object', (obj) => { objects.push(obj); render(); });
    socket.on('clear-board', () => { objects = []; render(); });

    // --- ОТРИСОВКА ---

    function render() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        objects.forEach(draw);
        if (currentObj) draw(currentObj);
    }

    function draw(obj) {
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        if (obj.type === 'pen') {
            ctx.beginPath();
            obj.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
        } else if (obj.type === 'rect') {
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'text') {
            ctx.font = "20px Arial";
            ctx.fillText(obj.content, obj.x, obj.y);
        } else if (obj.type === 'formula') {
            const img = new Image();
            img.src = obj.src;
            // Чтобы изображение отрисовалось, если оно еще не в кэше
            if (img.complete) {
                ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
            } else {
                img.onload = () => render();
            }
        }
    }

    // --- СОБЫТИЯ МЫШИ ---

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;

        if (tool === 'text') {
            const content = prompt("Введите текст:");
            if (content) {
                const textObj = { type: 'text', content, x: mX, y: mY, color: colorPicker.value };
                objects.push(textObj);
                socket.emit('new-object', textObj);
                render();
            }
            return;
        }

        isDrawing = true;
        if (tool === 'pen') {
            currentObj = { type: 'pen', color: colorPicker.value, points: [{x: mX, y: mY}] };
        } else if (tool === 'rect') {
            currentObj = { type: 'rect', color: colorPicker.value, x: mX, y: mY, w: 0, h: 0 };
        }
    };

    window.onmousemove = (e) => {
        if (!isDrawing || !currentObj) return;
        const rect = canvas.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;

        if (tool === 'pen') {
            currentObj.points.push({x: mX, y: mY});
        } else if (tool === 'rect') {
            currentObj.w = mX - currentObj.x;
            currentObj.h = mY - currentObj.y;
        }
        render();
    };

    window.onmouseup = () => {
        if (isDrawing && currentObj) {
            objects.push(currentObj);
            socket.emit('new-object', currentObj);
        }
        isDrawing = false;
        currentObj = null;
        render();
    };

    function clearBoard() {
        if(confirm("Очистить доску для всех?")) {
            objects = [];
            render();
            socket.emit('clear-board');
        }
    }
</script>
</body>
</html>
