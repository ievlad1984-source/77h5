<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Математична Дошка Pro 2026</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; }
        
        #toolbar {
            position: absolute; top: 15px; left: 15px; background: white; padding: 10px;
            display: flex; gap: 8px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.2); 
            z-index: 100; align-items: center; flex-wrap: wrap; max-width: 95vw;
        }

        .tool-btn { 
            padding: 10px 14px; cursor: pointer; border: 1px solid #e0e0e0; 
            background: #fff; border-radius: 8px; font-size: 14px; transition: 0.2s;
            display: flex; align-items: center; gap: 5px; user-select: none;
        }
        
        .tool-btn:hover { background: #f8f9fa; border-color: #007bff; }
        .tool-btn.active { background: #007bff; color: white; border-color: #0056b3; }

        /* Панель фігур */
        .shapes-wrapper { position: relative; }
        #shapes-menu {
            position: absolute; top: 50px; left: 0; background: white; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); display: none; padding: 15px;
            width: 320px; z-index: 101; border: 1px solid #ddd;
        }
        #shapes-menu.show { display: block; }
        
        .shape-category { margin-bottom: 15px; }
        .category-title { font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.8px; }
        .shape-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .shape-item { 
            aspect-ratio: 1; border: 1px solid #eee; border-radius: 6px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; transition: 0.15s; background: #fafafa;
        }
        .shape-item:hover { background: #eef6ff; border-color: #007bff; transform: translateY(-2px); }
        .shape-item.selected { border-color: #007bff; background: #eef6ff; box-shadow: 0 0 0 2px rgba(0,123,255,0.2); }

        /* Текстовий ввід */
        .text-input-div {
            position: absolute; min-width: 50px; outline: none; background: white;
            white-space: pre-wrap; word-wrap: break-word; padding: 6px; line-height: 1.2; 
            z-index: 1000; border: 2px solid #007bff; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #zoom-display { 
            position: absolute; bottom: 25px; right: 25px; background: white; 
            padding: 8px 18px; border-radius: 30px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; border: 1px solid #eee;
        }

        canvas { display: block; touch-action: none; background: #fff; }
        .separator { width: 1px; height: 30px; background: #eee; margin: 0 5px; }
    </style>
</head>
<body>

<div id="toolbar">
    <button class="tool-btn" data-tool="select" id="selectBtn">↖️ Виділення</button>
    <button class="tool-btn active" data-tool="pen">✏️ Перо</button>
    
    <div class="shapes-wrapper">
        <button class="tool-btn" id="shapesBtn">🔷 Фігури ▾</button>
        <div id="shapes-menu">
            <div class="shape-category">
                <div class="category-title">2D Фігури</div>
                <div class="shape-grid">
                    <div class="shape-item" data-shape="rect">⬜</div>
                    <div class="shape-item" data-shape="circle">⭕</div>
                    <div class="shape-item" data-shape="triangle">🔺</div>
                    <div class="shape-item" data-shape="rhombus">💠</div>
                    <div class="shape-item" data-shape="line">📏</div>
                    <div class="shape-item" data-shape="arrow">➡️</div>
                </div>
            </div>
            
            <div class="shape-category">
                <div class="category-title">3D Тіла</div>
                <div class="shape-grid">
                    <div class="shape-item" data-shape="cube" title="Куб">🧊</div>
                    <div class="shape-item" data-shape="cylinder" title="Циліндр">🛢️</div>
                    <div class="shape-item" data-shape="cone" title="Конус">🍦</div>
                </div>
            </div>

            <div class="shape-category">
                <div class="category-title">Інструменти</div>
                <div class="shape-grid">
                    <div class="shape-item" data-shape="ruler" title="Лінійка">📐</div>
                </div>
            </div>
        </div>
    </div>

    <button class="tool-btn" data-tool="text">Текст</button>
    <button class="tool-btn" data-tool="eraser">🧹 Ластик</button>
    
    <div class="separator"></div>
    <input type="color" id="colorPicker" value="#212529">
    <input type="range" id="lineWidth" min="1" max="20" value="3">
    <div class="separator"></div>
    <button class="tool-btn" id="clearBtn" style="color: #dc3545; border-color: #f8d7da;">🗑️ Очистити</button>
</div>

<div id="zoom-display">100%</div>
<canvas id="board"></canvas>

<script>
const boardId = window.location.pathname.replace('/', '') || 'main';
const socket = io({ query: { boardId } });
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const shapesMenu = document.getElementById('shapes-menu');

let scale = 1.0, offsetX = 0, offsetY = 0;
let objects = [], currentTool = 'pen', activeShape = 'rect', isDrawing = false, currentObj = null;
let selectedObj = null, dragStartX, dragStartY;

// Ініціалізація
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener('resize', resize);
resize();

// --- Робота з меню ---
document.getElementById('shapesBtn').onclick = (e) => {
    e.stopPropagation();
    shapesMenu.classList.toggle('show');
};

document.querySelectorAll('.shape-item').forEach(item => {
    item.onclick = (e) => {
        e.stopPropagation();
        setTool('shape', item.dataset.shape);
        shapesMenu.classList.remove('show');
    };
});

window.onclick = () => shapesMenu.classList.remove('show');

function setTool(tool, shape = null) {
    currentTool = tool;
    if (shape) activeShape = shape;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    if (tool === 'shape') document.getElementById('shapesBtn').classList.add('active');
    else document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
    selectedObj = null;
    draw();
}

// --- Рендеринг ---
function drawGrid() {
    const size = 50 * scale;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = '#f0f2f5';
    ctx.lineWidth = 1;
    for (let x = offsetX % size; x < canvas.width; x += size) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
    for (let y = offsetY % size; y < canvas.height; y += size) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
    ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();

    const all = currentObj ? [...objects, currentObj] : objects;

    all.forEach(obj => {
        ctx.save();
        ctx.lineWidth = obj.width * scale;
        ctx.strokeStyle = (obj === selectedObj) ? '#007bff' : obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const sX = obj.x * scale + offsetX;
        const sY = obj.y * scale + offsetY;
        const eX = obj.ex * scale + offsetX;
        const eY = obj.ey * scale + offsetY;
        const w = (obj.ex - obj.x) * scale;
        const h = (obj.ey - obj.y) * scale;

        ctx.beginPath();
        if (obj.type === 'pen') {
            ctx.moveTo(sX, sY);
            obj.points?.forEach(p => ctx.lineTo(p.x * scale + offsetX, p.y * scale + offsetY));
            ctx.stroke();
        } 
        else if (obj.type === 'text') {
            ctx.font = `${20 * scale}px Arial`;
            ctx.fillText(obj.text, sX, sY);
        }
        else if (obj.type === 'shape') {
            switch(obj.shape) {
                case 'rect': ctx.strokeRect(sX, sY, w, h); break;
                case 'circle': 
                    ctx.arc(sX + w/2, sY + h/2, Math.abs(w/2), 0, Math.PI * 2); 
                    ctx.stroke(); break;
                case 'line':
                case 'arrow':
                    ctx.moveTo(sX, sY); ctx.lineTo(eX, eY); ctx.stroke();
                    if (obj.shape === 'arrow') {
                        const angle = Math.atan2(eY - sY, eX - sX);
                        ctx.lineTo(eX - 15*scale * Math.cos(angle - 0.5), eY - 15*scale * Math.sin(angle - 0.5));
                        ctx.moveTo(eX, eY);
                        ctx.lineTo(eX - 15*scale * Math.cos(angle + 0.5), eY - 15*scale * Math.sin(angle + 0.5));
                        ctx.stroke();
                    } break;
                case 'triangle':
                    ctx.moveTo(sX + w/2, sY); ctx.lineTo(sX + w, sY + h); ctx.lineTo(sX, sY + h);
                    ctx.closePath(); ctx.stroke(); break;
                case 'cube':
                    const d = w * 0.3;
                    ctx.strokeRect(sX, sY + d, w - d, h - d);
                    ctx.strokeRect(sX + d, sY, w - d, h - d);
                    ctx.moveTo(sX, sY + d); ctx.lineTo(sX + d, sY);
                    ctx.moveTo(sX + w - d, sY + d); ctx.lineTo(sX + w, sY);
                    ctx.moveTo(sX, sY + h); ctx.lineTo(sX + d, sY + h - d);
                    ctx.moveTo(sX + w - d, sY + h); ctx.lineTo(sX + w, sY + h - d);
                    ctx.stroke(); break;
                case 'cylinder':
                    ctx.ellipse(sX + w/2, sY, Math.abs(w/2), Math.abs(h * 0.1), 0, 0, Math.PI * 2);
                    ctx.ellipse(sX + w/2, sY + h, Math.abs(w/2), Math.abs(h * 0.1), 0, 0, Math.PI * 2);
                    ctx.moveTo(sX, sY); ctx.lineTo(sX, sY + h);
                    ctx.moveTo(sX + w, sY); ctx.lineTo(sX + w, sY + h);
                    ctx.stroke(); break;
                case 'ruler':
                    ctx.strokeRect(sX, sY, w, h);
                    for(let i=0; i<Math.abs(w); i+=10*scale) {
                        ctx.moveTo(sX + i * Math.sign(w), sY);
                        ctx.lineTo(sX + i * Math.sign(w), sY + (i % 50 === 0 ? 15 : 7) * scale);
                    }
                    ctx.stroke(); break;
            }
        }
        ctx.restore();
    });
}

// --- Події та логіка ---
function getCoords(e) {
    const t = (e.touches && e.touches[0]) || e;
    return { 
        x: (t.clientX - offsetX) / scale, 
        y: (t.clientY - offsetY) / scale,
        clientX: t.clientX, clientY: t.clientY
    };
}

const startHandler = (e) => {
    if (e.target.closest('#toolbar')) return;
    isDrawing = true;
    const c = getCoords(e);

    if (currentTool === 'text') {
        createTextInput(c);
        isDrawing = false; return;
    }

    if (currentTool === 'eraser') {
        const initialLen = objects.length;
        objects = objects.filter(obj => {
            const dist = Math.hypot(obj.x - c.x, obj.y - c.y);
            return dist > 25/scale;
        });
        if (objects.length !== initialLen) {
            socket.emit('update-all', objects);
            draw();
        }
        isDrawing = false; return;
    }

    if (currentTool === 'select') {
        selectedObj = [...objects].reverse().find(obj => {
            return Math.hypot(obj.x - c.x, obj.y - c.y) < 30/scale;
        });
        if (selectedObj) {
            dragStartX = c.x; dragStartY = c.y;
        }
        draw(); return;
    }

    currentObj = {
        type: currentTool, shape: activeShape,
        x: c.x, y: c.y, ex: c.x, ey: c.y,
        color: document.getElementById('colorPicker').value,
        width: document.getElementById('lineWidth').value,
        points: [{x: c.x, y: c.y}]
    };
};

const moveHandler = (e) => {
    if (!isDrawing) return;
    const c = getCoords(e);

    if (currentTool === 'select' && selectedObj) {
        const dx = c.x - dragStartX, dy = c.y - dragStartY;
        selectedObj.x += dx; selectedObj.y += dy;
        if (selectedObj.ex !== undefined) { selectedObj.ex += dx; selectedObj.ey += dy; }
        if (selectedObj.points) selectedObj.points.forEach(p => { p.x += dx; p.y += dy; });
        dragStartX = c.x; dragStartY = c.y;
    } else if (currentTool === 'pen') {
        currentObj.points.push({x: c.x, y: c.y});
    } else if (currentObj) {
        currentObj.ex = c.x; currentObj.ey = c.y;
    }
    draw();
};

const endHandler = () => {
    if (isDrawing && currentObj) {
        objects.push(currentObj);
        socket.emit('new-object', currentObj);
    }
    if (currentTool === 'select' && selectedObj) socket.emit('update-all', objects);
    isDrawing = false; currentObj = null; draw();
};

// Динамічний текст
function createTextInput(c) {
    const div = document.createElement('div');
    div.className = 'text-input-div';
    div.contentEditable = true;
    div.style.left = c.clientX + 'px';
    div.style.top = c.clientY + 'px';
    div.style.color = document.getElementById('colorPicker').value;
    div.style.fontSize = (20 * scale) + 'px';
    
    document.body.appendChild(div);
    setTimeout(() => div.focus(), 10);

    div.onblur = () => {
        if (div.innerText.trim()) {
            const obj = { 
                type: 'text', x: c.x, y: c.y, 
                text: div.innerText, color: div.style.color, 
                width: 2, size: 20 
            };
            objects.push(obj);
            socket.emit('new-object', obj);
        }
        document.body.removeChild(div); draw();
    };
}

// Очищення (Виправлено)
document.getElementById('clearBtn').onclick = () => {
    if (confirm("Очистити дошку для всіх учасників?")) {
        objects = [];
        socket.emit('delete-board');
        draw();
    }
};

// Слухачі подій
canvas.addEventListener('mousedown', startHandler);
window.addEventListener('mousemove', moveHandler);
window.addEventListener('mouseup', endHandler);

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startHandler(e); }, {passive: false});
window.addEventListener('touchmove', (e) => { if(isDrawing) e.preventDefault(); moveHandler(e); }, {passive: false});
window.addEventListener('touchend', endHandler);

// Масштабування
window.addEventListener('wheel', (e) => {
    if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const oldScale = scale;
        scale = Math.min(Math.max(scale * delta, 0.2), 4);
        offsetX = e.clientX - (e.clientX - offsetX) * (scale / oldScale);
        offsetY = e.clientY - (e.clientY - offsetY) * (scale / oldScale);
        document.getElementById('zoom-display').innerText = `${Math.round(scale * 100)}%`;
        draw();
    }
}, { passive: false });

// Панель інструментів
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.onclick = () => setTool(btn.dataset.tool);
});

// Сокети
socket.on('init-history', h => { objects = h; draw(); });
socket.on('new-object', o => { objects.push(o); draw(); });
socket.on('update-all', newObjs => { objects = newObjs; draw(); });
socket.on('board-deleted', () => { objects = []; draw(); });

</script>
</body>
</html>
